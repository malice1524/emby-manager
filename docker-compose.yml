version: "3.8"

services:
  emby-manager:
    image: 1524566636/emby-manager:latest
    container_name: emby-manager
    environment:
      - EMBY_URL=http://192.168.1.7:8096
      - EMBY_API_KEY=859413e6f23e4c42b2a095682ef5c068
      - NFO_MEDIA_ROOT=/vol1/1000/docker/strm
    volumes:
      - /vol1/1000/docker/strm:/vol1/1000/docker/strm
    ports:
      - "8117:8000"
    restart: unless-stopped
