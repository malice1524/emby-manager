<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Emby Manager</title>
<link rel="icon" href="lib/favicon.png">
<link rel="stylesheet" href="lib/element-plus.css"/>
<script src="lib/vue.js"></script>
<script src="lib/vue-router.js"></script>
<script src="lib/element-plus.js"></script>

<style>
/* Using system fonts for offline reliability */

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0a0a14;
  --surface: rgba(255,255,255,0.03);
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.15);
  --text: #e8e8f0;
  --text-dim: rgba(255,255,255,0.5);
  --text-muted: rgba(255,255,255,0.35);
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.4);
  --accent2: #a29bfe;
  --green: #00cec9;
  --green-glow: rgba(0,206,201,0.4);
  --pink: #fd79a8;
  --pink-glow: rgba(253,121,168,0.4);
  --orange: #fdcb6e;
  --orange-glow: rgba(253,203,110,0.4);
  --red: #ff7675;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Background ambient */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,92,231,0.12), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(0,206,201,0.08), transparent),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(253,121,168,0.06), transparent);
}

/* ---- Layout ---- */
.layout { display: flex; min-height: 100dvh; position: relative; z-index: 1 }

/* ---- Sidebar ---- */
.sidebar {
  width: 240px; min-height: 100dvh;
  background: rgba(10,10,20,0.85);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-right: 1px solid var(--glass-border);
  padding: 28px 0;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 90;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 0 24px; margin-bottom: 36px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.sidebar-logo h2 {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: -0.3px;
}
.sidebar nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 24px; margin: 2px 12px;
  color: var(--text-dim); text-decoration: none;
  font-size: 14px; font-weight: 450;
  border-radius: 10px; transition: all var(--transition);
}
.sidebar nav a:hover { color: var(--text); background: var(--glass); }
.sidebar nav a.router-link-active {
  color: #fff; background: rgba(108,92,231,0.15);
  box-shadow: inset 0 0 0 1px rgba(108,92,231,0.25);
}
.sidebar nav a .nav-icon { font-size: 18px; opacity: 0.7; width: 20px; text-align: center }
.sidebar nav a.router-link-active .nav-icon { opacity: 1 }

.sidebar-version {
  position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px;
  padding: 8px 0;
}

.main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: 100% }

/* ---- Mobile ---- */
.topbar { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: 260px; top: 0; z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .sidebar .sidebar-logo { padding-top: 4px; }
  .main { margin-left: 0; padding: 16px 14px; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; position: sticky; top: 0; z-index: 150;
    background: rgba(10,10,20,0.8);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
  }
  .topbar .menu-btn { font-size: 20px; cursor: pointer; color: var(--text); line-height: 1; }
  .topbar h2 { font-size: 16px; font-weight: 600; }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 180;
  }
  .sidebar-overlay.show { display: block; }
  .el-dialog.is-fullscreen { z-index: 2001 !important; }
  .el-overlay { z-index: 2000 !important; }
}

/* ---- Glass Card ---- */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
  transition: all var(--transition);
}
.glass-card:hover {
  border-color: var(--glass-border-hover);
  background: var(--glass-hover);
}

/* ---- Monitor search results ---- */
.monitor-search-results { margin-top: 12px; display: grid; gap: 8px; max-width: 100%; overflow: hidden; }
.monitor-search-result-item { display: flex; align-items: center; gap: 12px; min-width: 0; max-width: 100%; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(255,255,255,0.03); cursor: pointer; }
.monitor-search-poster { width: 42px; height: 63px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.monitor-search-poster-placeholder { width: 42px; height: 63px; border-radius: 6px; background: var(--glass); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.monitor-search-body { flex: 1 1 auto; min-width: 0; max-width: 100%; overflow: hidden; }
.monitor-search-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.monitor-search-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.monitor-search-overview { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.35; overflow: hidden; display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient: vertical; overflow-wrap:anywhere; word-break: break-word; }
.monitor-refresh-btn.el-button { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text); background: var(--glass); border: 1px solid var(--glass-border); box-shadow: none; }
.monitor-refresh-btn.el-button:hover, .monitor-refresh-btn.el-button:focus { color: #fff; background: var(--glass-hover); border-color: var(--glass-border-hover); }
.monitor-refresh-btn.el-button.is-disabled { color: var(--text-dim); background: var(--glass); border-color: var(--glass-border); opacity: 0.75; }
.monitor-refresh-icon { display: inline-flex; align-items: center; justify-content: center; line-height: 1; transition: transform var(--transition); }
.monitor-refresh-icon.spinning { animation: monitor-refresh-spin 0.8s linear infinite; }
@keyframes monitor-refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  .monitor-search-result-item { align-items: flex-start; gap: 10px; }
  .monitor-search-result-item .el-button { padding: 6px 8px; }
}

/* ============ DASHBOARD — Gallery Style ============ */

/* Hero banner */
.hero {
  position: relative; overflow: hidden;
  border-radius: 20px; margin-bottom: 28px;
  padding: 36px 32px;
  background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.08));
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}
.hero::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 100% at 30% 20%, rgba(108,92,231,0.12), transparent),
              radial-gradient(ellipse 50% 100% at 80% 50%, rgba(0,206,201,0.06), transparent);
}
.hero-server {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  position: relative; z-index: 1;
}
.hero-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #4834d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 20px rgba(108,92,231,0.4);
}
.hero-server h2 { font-size: 20px; font-weight: 600; }
.hero-server span { font-size: 12px; color: var(--text-muted); }

.hero-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  position: relative; z-index: 1;
}
@media (max-width: 480px) { .hero-stats { grid-template-columns: repeat(2,1fr); } }
.hero-stat {
  text-align: center; padding: 12px 8px;
  border-radius: 12px; background: rgba(255,255,255,0.03);
  border: 1px solid transparent;
  transition: all 0.25s ease;
}
.hero-stat:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.05); }
.hero-stat .val {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8f0 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-stat .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ---- Section Title ---- */
.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px;
}

/* ---- Poster Grid (Recently Added) ---- */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px; margin-bottom: 28px;
}
@media (max-width: 480px) { .poster-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; } }

.poster-card {
  position: relative; border-radius: 10px; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center center;
}
.poster-card:hover {
  transform: scale(1.06); z-index: 10;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--glass-border-hover);
  border-color: rgba(255,255,255,0.2);
}
.poster-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.poster-card:hover img { transform: scale(1.1); }

.poster-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
  pointer-events: none;
}
.poster-overlay .tt {
  font-size: 12px; font-weight: 600; color: #fff;
  line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.poster-overlay .yr {
  font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px;
}
.poster-type {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  font-size: 9px; padding: 3px 8px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: #fff; letter-spacing: 0.5px;
}
.poster-type.series { background: rgba(0,206,201,0.7); }
.poster-type.movie { background: rgba(108,92,231,0.7); }

.poster-placeholder {
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--text-muted);
}

/* ---- Activity Feed ---- */
.activity-feed {
  display: flex; flex-direction: column; gap: 0;
  max-height: 320px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent;
}
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px;
  transition: background 0.15s ease;
  font-size: 13px;
}
.activity-item:hover { background: var(--glass); }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
}
.activity-item .act-text { flex: 1; color: var(--text-dim); line-height: 1.4; }
.activity-item .act-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

/* ---- Sessions Row ---- */
.sessions-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}

/* ---- Now Playing ---- */
.nowplaying-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 10px;
  border-bottom: 1px solid var(--glass-border);
  transition: background 0.2s ease;
}
.nowplaying-item:last-child { border-bottom: none; }
.nowplaying-item:hover { background: var(--glass); }

.np-poster {
  width: 44px; height: 66px; border-radius: 6px; overflow: hidden; flex-shrink: 0;
  background: var(--glass); border: 1px solid var(--glass-border);
}
.np-poster img { width:100%; height:100%; object-fit:cover; }
.np-poster-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-muted); }

.np-info { flex: 1; min-width:0; }
.np-user { font-size:13px; font-weight:600; color:var(--text); }
.np-title { font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:2px 0 6px; }
.np-progress { display:flex; align-items:center; gap:6px; }
.np-bar-bg { flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.np-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.5s ease; }
.np-pct { font-size:10px; color:var(--text-muted); min-width:32px; text-align:right; }

.np-status { font-size:18px; flex-shrink:0; }
.np-status.playing { color:var(--green); }
.np-status.paused { color:var(--orange); }
.np-status.idle { color:var(--text-muted); }
.session-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 24px;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.2s ease; font-size: 12px;
}
.session-chip:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); }
.session-chip .u-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), #6c5ce7);
  color: #fff; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.session-chip .u-info { line-height: 1.3; }
.session-chip .u-name { font-weight: 600; color: var(--text); }
.session-chip .u-device { font-size: 10px; color: var(--text-muted); }

/* ---- Library Filter Chips ---- */
.lib-filter {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.dashboard-library-filter {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px;
  margin-bottom: 16px; width: 100%;
}
.filter-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-dim); transition: all 0.2s ease;
  user-select: none; -webkit-user-select: none; white-space: nowrap;
}
.dashboard-library-filter .filter-chip { text-align: center; padding: 7px 10px; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.filter-chip:hover { border-color: var(--glass-border-hover); color: var(--text); }
.filter-chip.active {
  background: rgba(108,92,231,0.2); border-color: var(--accent);
  color: #fff;
}

/* Two column for sections */
.dash-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
@media (max-width: 768px) { .dash-sections { grid-template-columns: 1fr; } }

/* Glass card for sections */
.glass-block {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ---- Library Grid ---- */
.lib-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
@media (max-width: 768px) { .lib-grid { grid-template-columns: repeat(2,1fr); gap: 10px; } }
@media (max-width: 480px) { .lib-grid { grid-template-columns: 1fr; } }

.lib-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 18px; cursor: pointer;
  transition: all var(--transition);
  position: relative; overflow: hidden;
}
.lib-card::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(108,92,231,0.12), transparent 60%);
  opacity: 0; transition: opacity var(--transition);
}
.lib-card:hover { border-color: var(--glass-border-hover); transform: translateY(-2px); }
.lib-card:hover::after { opacity: 1; }
.lib-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.lib-card p { font-size: 11px; color: var(--text-dim); margin: 2px 0; }
.lib-card .path { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-card .type-badge {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 20px; font-weight: 500; margin-bottom: 6px;
  background: rgba(108,92,231,0.15); color: var(--accent2);
}
.lib-card.tv .type-badge { background: rgba(0,206,201,0.15); color: var(--green); }

/* ---- Table Override ---- */
.el-table {
  --el-table-bg-color: transparent;
  --el-table-tr-bg-color: transparent;
  --el-table-header-bg-color: rgba(255,255,255,0.04);
  --el-table-border-color: var(--glass-border);
  --el-table-text-color: var(--text);
  --el-table-header-text-color: var(--text-dim);
  --el-table-row-hover-bg-color: var(--glass);
}
.el-table th.el-table__cell { border-bottom: 1px solid var(--glass-border); font-weight: 500; }
.el-table td.el-table__cell { border-bottom: 1px solid var(--glass-border); }
.el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell {
  background: rgba(255,255,255,0.02);
}

/* ---- Element Plus Overrides ---- */
.el-button--primary {
  --el-button-bg-color: var(--accent);
  --el-button-border-color: var(--accent);
  --el-button-hover-bg-color: #7c6ff7;
  --el-button-hover-border-color: #7c6ff7;
}
.el-dialog {
  --el-dialog-bg-color: rgba(20,20,35,0.97);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.el-overlay { background: rgba(0,0,0,0.6) !important; }
@media (min-width: 769px) {
  .el-overlay { margin-left: 240px; width: calc(100% - 240px); }
  .library-items-dialog { width: min(85vw, calc(100vw - 320px)) !important; margin-left: calc(240px + (100vw - 240px - min(85vw, calc(100vw - 320px))) / 2) !important; margin-right: 0 !important; }
  .library-items-dialog .poster-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
  .library-items-dialog .poster-card { max-height: 165px; }
}
.library-items-dialog .el-dialog__body { max-height: calc(100vh - 110px); overflow: hidden; }
.library-items-panel { display: flex; flex-direction: column; height: calc(100vh - 150px); min-height: 360px; }
.library-items-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding-right: 4px; }
.library-pagination { flex-shrink: 0; padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--glass-border); display: flex; justify-content: center; }
.library-pagination .el-pagination { flex-wrap: wrap; justify-content: center; row-gap: 6px; }
@media (max-width: 768px) {
  .library-items-dialog .el-dialog__body { max-height: none; overflow: hidden; }
  .library-items-panel { height: calc(100dvh - 118px); min-height: 0; }
  .library-pagination { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
}
.el-dialog__header { border-bottom: 1px solid var(--glass-border); }
.el-dialog__title { color: var(--text); font-weight: 600; }
.el-input__wrapper {
  background: var(--glass) !important;
  border: 1px solid var(--glass-border) !important;
  box-shadow: none !important; border-radius: 8px !important;
}
.el-input__inner { color: var(--text) !important; }
.el-tag { border: none !important; font-weight: 500; }
.el-pagination button { background: var(--glass) !important; border-color: var(--glass-border) !important; color: var(--text-dim) !important; }
.el-pagination button:disabled { opacity: 0.4; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

/* ---- User List (Vertical) ---- */
.user-list { display: flex; flex-direction: column; gap: 8px; }
.user-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.user-row:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); }

.user-row .ur-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  box-shadow: 0 2px 12px rgba(108,92,231,0.3);
}
.user-row .ur-avatar.admin { background: linear-gradient(135deg, #fd79a8, #e84393); }
.user-row .ur-avatar.disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); box-shadow: none; }

.user-row .ur-meta { flex: 1; min-width: 0; }
.user-row .ur-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.user-row .ur-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.user-row .ur-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
}
.user-row .ur-tag.admin { background: rgba(253,121,168,0.15); color: var(--pink); }
.user-row .ur-tag.normal { background: rgba(0,206,201,0.15); color: var(--green); }
.user-row .ur-tag.disabled { background: rgba(255,118,117,0.15); color: var(--red); }
.user-row .ur-tag.date { background: rgba(255,255,255,0.04); color: var(--text-muted); font-size: 10px; }

.user-row .ur-actions { display: flex; gap: 4px; flex-shrink: 0; }
@media (max-width: 480px) {
  .user-row { flex-wrap: wrap; }
  .user-row .ur-actions { width: 100%; justify-content: flex-end; padding-top: 4px; }
}

/* Page header */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.page-header h1 { font-size: 20px; font-weight: 600; }

/* Monitor page: keep Element Plus collapse in dark glass theme */
.monitor-page .el-collapse { border: 1px solid var(--glass-border); border-radius: var(--radius-sm); overflow: hidden; background: var(--glass); }
.monitor-page .el-collapse-item__header,
.monitor-page .el-collapse-item__wrap { background: rgba(255,255,255,0.03); color: var(--text); border-bottom-color: var(--glass-border); }
.monitor-page .el-collapse-item__content { color: var(--text-dim); padding: 12px; }

/* ---- Animations ---- */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeInUp 0.5s ease both; }
.fade-in-1 { animation-delay: 0.05s; }
.fade-in-2 { animation-delay: 0.10s; }
.fade-in-3 { animation-delay: 0.15s; }
.fade-in-4 { animation-delay: 0.20s; }
.fade-in-5 { animation-delay: 0.25s; }
.fade-in-6 { animation-delay: 0.30s; }
</style>

function toggleSidebar() {
  var s = document.getElementById('sidebar');
  var o = document.querySelector('.sidebar-overlay');
  s.classList.toggle('open'); o.classList.toggle('show');
}
function navClose() { 
  if (window.innerWidth < 768) { setTimeout(toggleSidebar, 120); }
}

const API = '/api'

async function fetchJSON(url, opts = {}) {
  const res = await fetch(API+url, {headers:{'Content-Type':'application/json'},...opts})
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||res.statusText) }
  return res.json()
}

  data(){
    return {
      data: {media:{},server:{},users:{},sessions:{}},
      recent: [], activity: [], loaded: false,
      showDetail: false, detailItem: null, expanded: false, showDetailDel: false, showLibDel: false,
      isMobile: window.innerWidth < 640,
      libraries: [], activeLibrary: '', libraryName: '', _excludeIds: ''
    }
  },
  computed: {
    activePlaying(){
      if(!this.data.sessions?.streams) return []
      return this.data.sessions.streams.filter(s => s.has_playing)
    },
    idleCount(){
      if(!this.data.sessions?.streams) return 0
      return this.data.sessions.streams.filter(s => !s.has_playing).length
    }
  },
  async mounted(){
    window.addEventListener('resize', ()=>{ this.isMobile = window.innerWidth < 640 })
    await this.refreshAll()
    this._poll = setInterval(() => this.refreshStats(), 15000)
  },
  beforeUnmount(){ if(this._poll) clearInterval(this._poll) },
  methods: {
    async refreshAll(){
      try {
        const [ov, rec, act, libs] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/recent?limit=18'),
          fetchJSON('/dashboard/stats'),
          fetchJSON('/libraries'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
        this.libraries = (libs.libraries || []).filter(function(l) {
          return l.name !== '欧美自拍' && l.name !== '亚洲自拍' && l.name !== '日本有码'
        })
        // Find excluded library IDs
        var allLibs = libs.libraries || []
        var excludeNames = {'欧美自拍':1,'亚洲自拍':1,'日本有码':1}
        this._excludeIds = allLibs.filter(function(l){return excludeNames[l.name]}).map(function(l){return l.id}).join(',')
        // Set default to 欧美电影
        var defaultLibId = ''
        for(var i=0;i<allLibs.length;i++){if(allLibs[i].name==='欧美电影'){defaultLibId=allLibs[i].id;break}}
        // Fetch recent with default library
        try {
          var url = '/dashboard/recent?limit=18'
          if(defaultLibId) url += '&parent_id='+defaultLibId
          else if(this._excludeIds) url += '&exclude_parent_ids='+this._excludeIds
          const r2 = await fetchJSON(url)
          this.recent = r2.items || []
          this.activeLibrary = defaultLibId
          this.libraryName = defaultLibId ? '欧美电影' : ''
        } catch(e) {}
      } catch(e) { console.error(e) }
      this.loaded = true
    },
    async refreshStats(){
      try {
        const [ov, act] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/stats'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
      } catch(e) { /* silent */ }
    },
    async filterLibrary(id, name){
      this.activeLibrary = id; this.libraryName = name || '';
      try {
        var url = '/dashboard/recent?limit=18'
        if(id) url += '&parent_id='+id
        const rec = await fetchJSON(url)
        this.recent = rec.items || []
      } catch(e) { console.error(e) }
    },
    fmtTime(d){ if(!d)return''; const t=new Date(d); return t.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) },
    openUrl(url){ window.open(url, '_blank') },
    async deleteDetailItem(){
      if(!this.detailItem || !this.detailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.detailItem.id, {method:'DELETE'})
        this.recent = this.recent.filter(item => item.id !== this.detailItem.id)
        ElementPlus.ElMessage.success('已删除')
        this.showDetailDel = false
        this.showDetail = false
        setTimeout(() => this.refreshAll(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showDetailDel = false }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        const res = await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error('删除失败'); this.showLibDel = false }
    },
    async openItem(item){
      this.showDetail = true; this.expanded = false
      this.detailItem = item
      this.detailItem = item  // show basic info first
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id)
        this.detailItem = detail
      } catch(e) { /* keep basic info */ }
    }
  }
}

      isMobile: window.innerWidth < 640,
      showDetail:false, libDetailItem:null, libExpanded:false, showLibDel:false,
      _searchTimer:null
    }
  },
  async mounted(){
    const d=await fetchJSON('/libraries'); this.libraries=d.libraries||[];
    window.addEventListener('resize',()=>{this.isMobile=window.innerWidth<640})
  },
  methods: {
    libCountText(lib){
      const counts = lib.counts || {}
      if(lib.type === 'tvshows') return (counts.series || 0) + ' 部剧集'
      if(lib.type === 'movies') return (counts.movies || 0) + ' 部电影'
      return (counts.total || 0) + ' 个媒体'
    },
    libSubCountText(lib){
      return '点击查看全部'
    },
    openUrl(url){ window.open(url, '_blank') },
    async openLib(lib){
      this.curLib=lib; this.page=1; this.search=''; this.showItems=true;
      await this.loadItems()
    },
    onSearch(){
      if(this._searchTimer) clearTimeout(this._searchTimer);
      this._searchTimer = setTimeout(() => { this.page=1; this.loadItems() }, 400)
    },
    async loadItems(){
      if(!this.curLib)return; this.itemsLoading=true;
      const params = new URLSearchParams({page:this.page-1, limit:this.pageSize});
      if(this.search) params.set('search', this.search);
      if(this.curLib.type) params.set('types', this.curLib.type);
      const data = await fetchJSON('/libraries/'+this.curLib.id+'/items?'+params);
      this.items=data.items||[]; this.total=data.total||0;
      this.itemsLoading=false;
    },
    async openLibItem(item){
      this.showDetail=true; this.libExpanded=false; this.showLibDel=false;
      this.libDetailItem=item;
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id);
        this.libDetailItem = detail;
      } catch(e) { /* keep basic */ }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        this.items = this.items.filter(item => item.id !== this.libDetailItem.id)
        if(this.total > 0) this.total -= 1
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showLibDel = false }
    }
  }
}

          </el-upload>

        <!-- 生成按钮 -->
        <el-button @click="generateNfo" :loading="generating" :disabled="!person || !form.filename.trim()" type="primary" size="large"
                   :style="'width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;font-size:15px;font-weight:600;height:46px;border-radius:12px'">

        </el-button>

        <!-- 成功提示 -->
        <div v-if="generated" style="margin-top:16px;padding:12px 16px;border-radius:10px;background:rgba(0,206,201,0.1);border:1px solid rgba(0,206,201,0.25);color:var(--green);font-size:13px;display:flex;align-items:center;gap:8px">

      thumbPreview: '',
      generating: false,
      generated: false
    }
  },
  methods: {
    async lookupPerson(){
      const id = parseInt(this.form.tmdbId);
      if(!id || id < 1){ this.lookupError='请输入有效的 TMDB ID'; return }
      this.lookingUp=true; this.lookupError=''; this.person=null;
      try {
        const res = await fetch(`/api/nfo/person/${id}`);
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'查询失败') }
        this.person = await res.json();
      } catch(e){
        this.lookupError = e.message;
      } finally {
        this.lookingUp=false;
      }
    },
    handleFileChange(uploadFile){
      this.thumbFile = uploadFile.raw;
      const reader = new FileReader();
      reader.onload = e => { this.thumbPreview = e.target.result };
      reader.readAsDataURL(uploadFile.raw);
    },
    clearThumb(){
      this.thumbFile = null;
      this.thumbPreview = '';
    },
    async generateNfo(){
      if(!this.form.filename.trim() || !this.person) return;
      this.generating=true; this.generated=false;
      try {
        // 过滤文件名中不允许的字符
        const safeFilename = this.form.filename.trim().replace(/[/\\:*?"<>|]/g, '_');
        const formData = new FormData();
        formData.append('filename', safeFilename);
        formData.append('tmdb_id', this.person.tmdb_id);
        if(this.thumbFile) formData.append('thumb', this.thumbFile);

        const res = await fetch('/api/nfo/generate', { method:'POST', body: formData });
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'生成失败') }

        // 下载 zip
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${safeFilename}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        this.generated = true;
        setTimeout(() => { this.generated = false }, 4000);
      } catch(e){
        ElementPlus.ElMessage.error(e.message || '生成失败');
      } finally {
        this.generating = false;
      }
    }
  }
}

        <div v-for="s in filteredList" :key="s.tmdb_id" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--glass-border)">
          <img v-if="s.poster_url" :src="s.poster_url" style="width:44px;height:66px;object-fit:cover;border-radius:6px;flex-shrink:0" @error="$event.target.style.display='none'" />
          <div v-else style="width:44px;height:66px;border-radius:6px;background:var(--glass);display:flex;align-items:center;justify-content:center;flex-shrink:0">📺</div>
          <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{s.title}} <span v-if="s.year" style="font-size:12px;color:var(--text-dim);font-weight:400">({{s.year}})</span></div><div style="font-size:12px;color:var(--text-dim);margin-top:4px">{{s.type || '-'}} · ⭐ {{s.vote_average || '-'}}</div><div v-if="s.last_episode?.episode_number" style="font-size:12px;color:var(--text-dim);margin-top:2px">📺 S{{s.last_episode.season_number}}E{{s.last_episode.episode_number}}{{s.total_episodes ? ' / '+s.total_episodes+' 集' : ''}}</div><div v-if="s.next_episode?.air_date && s.current_status!=='Ended' && s.current_status!=='Canceled'" style="font-size:12px;color:var(--green);margin-top:2px">📅 {{s.next_episode.air_date}} · {{daysUntil(s.next_episode.air_date)}}</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0"><span v-if="s.current_status==='Ended'" style="font-size:12px;color:var(--red)">🔴 已完结</span><span v-else-if="s.current_status==='Canceled'" style="font-size:12px;color:var(--text-muted)">⚫ 已取消</span><span v-else style="font-size:12px;color:var(--green)">🟢 连载中</span><span v-if="s.current_status==='Ended'" style="font-size:11px;color:var(--text-dim)">{{s.notified_ended ? '✅ 已通知' : '⏳ 待通知'}}</span><el-button size="small" type="danger" text @click="deleteSeries(s.tmdb_id)">删除</el-button></div>
        </div>
      </div>

      <div style="margin-top:16px">
        <el-collapse v-model="activeCollapse">
          <el-collapse-item title="📊 运行状态" name="status"><div class="glass-card" style="padding:16px"><div v-if="monitorStatus" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;font-size:13px"><div><span style="color:var(--text-dim)">状态：</span>{{monitorStatus.is_running ? '🟢 运行中' : '🔴 已停止'}}</div><div><span style="color:var(--text-dim)">监控剧集：</span>{{monitorStatus.monitored_count}} 部</div><div><span style="color:var(--text-dim)">上次检查：</span>{{fmtTime2(monitorStatus.last_check_time)}}</div><div><span style="color:var(--text-dim)">最近通知：</span>{{fmtTime2(monitorStatus.last_notification_time)}}</div></div><div v-else style="color:var(--text-muted);font-size:13px">加载中...</div></div></el-collapse-item>
          <el-collapse-item title="📄 检查日志" name="logs"><div class="glass-card" style="padding:16px"><div v-if="logs.length"><div v-for="(log,i) in logs" :key="i" style="padding:6px 0;border-bottom:1px solid var(--glass-border);font-size:12px;display:flex;gap:8px"><span style="color:var(--text-muted);flex-shrink:0">{{fmtTime2(log.time)}}</span><span :style="{color: log.status==='ok' ? 'var(--green)' : 'var(--orange)'}">{{log.status==='ok' ? '✅' : '⚠️'}}</span><span style="color:var(--text-dim)">{{log.message}}</span></div></div><div v-else style="color:var(--text-muted);font-size:13px">暂无日志</div></div></el-collapse-item>
        </el-collapse>
      </div>

      <el-dialog v-model="showSettings" title="⚙️ 完结监控设置" width="min(92vw,520px)" :style="'--el-dialog-bg-color:var(--surface);--el-dialog-text-color:var(--text);--el-dialog-border-color:var(--glass-border)'">
        <div style="display:flex;flex-direction:column;gap:14px">
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">TMDB API Key</div><input v-model="config.tmdb_api_key" placeholder="留空则保留原配置或使用环境变量" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none" /></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">Telegram Bot Token</div><input v-model="config.tg_bot_token" placeholder="留空则保留原配置或使用环境变量" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none" /></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">Telegram Chat ID</div><input v-model="config.tg_chat_id" placeholder="留空则保留原配置或使用环境变量" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none" /></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">代理 URL（可选）</div><input v-model="config.proxy_url" placeholder="http://127.0.0.1:7890" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none" /></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">检查间隔（分钟）</div><input v-model.number="config.check_interval_minutes" type="number" min="1" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none" /></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">更新通知模板</div><textarea v-model="config.update_template" rows="3" placeholder="可选，自定义新集通知模板" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none;resize:vertical"></textarea></div>
          <div><div style="font-size:13px;font-weight:500;margin-bottom:4px">完结通知模板</div><textarea v-model="config.end_template" rows="3" placeholder="可选，自定义完结通知模板" style="width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);outline:none;resize:vertical"></textarea></div>
        </div>
        <template #footer><div style="display:flex;gap:8px;justify-content:flex-end"><el-button @click="testConfig">测试通知</el-button><el-button @click="saveConfig" type="primary" style="background:var(--accent);border-color:var(--accent)">💾 保存</el-button></div></template>
      </el-dialog>
    </div>
  `,
  data(){ return { searchQuery:'', searchResults:[], searching:false, searchError:'', monitoredList:[], loadingList:false, refreshing:false, showSettings:false, filterStatus:'all', monitorStatus:null, logs:[], activeCollapse:[], config:{tmdb_api_key:'',tg_bot_token:'',tg_chat_id:'',proxy_url:'',update_template:'',end_template:'',check_interval_minutes:30} } },
  computed:{ filteredList(){ if(this.filterStatus==='continuing') return this.monitoredList.filter(s=>s.current_status!=='Ended'&&s.current_status!=='Canceled'); if(this.filterStatus==='ended') return this.monitoredList.filter(s=>s.current_status==='Ended'); return this.monitoredList } },
  async mounted(){ await this.loadList(); await this.loadConfig(); await this.loadStatus(); await this.loadLogs(); this._statusTimer=setInterval(()=>{this.loadStatus();this.loadLogs()},30000) },
  beforeUnmount(){ if(this._statusTimer) clearInterval(this._statusTimer) },
  methods:{
    async doSearch(){ if(!this.searchQuery.trim()) return; this.searching=true; this.searchError=''; try{ const d=await fetchJSON('/tmdb/search?q='+encodeURIComponent(this.searchQuery.trim())); this.searchResults=d.results||[]; if(!this.searchResults.length) this.searchError='未找到相关剧集' }catch(e){ this.searchError=e.message }finally{ this.searching=false } },
    async addSeries(item){ try{ const d=await fetchJSON('/monitor/add',{method:'POST',body:JSON.stringify({tmdb_id:item.tmdb_id,title:item.title,year:item.year,poster_url:item.poster_url})}); ElementPlus.ElMessage.success(d.notification_sent?'已添加并发送通知':'已添加'); this.searchResults=[]; this.searchQuery=''; await this.loadList(); await this.loadStatus() }catch(e){ ElementPlus.ElMessage.error(e.message) } },
    async deleteSeries(tmdbId){ try{ await ElementPlus.ElMessageBox.confirm('确定要删除该剧集的监控吗？','确认删除',{type:'warning'}); await fetchJSON('/monitor/'+tmdbId,{method:'DELETE'}); this.monitoredList=this.monitoredList.filter(s=>s.tmdb_id!==tmdbId); ElementPlus.ElMessage.success('已删除'); await this.loadStatus() }catch(e){ if(e!=='cancel') ElementPlus.ElMessage.error(e.message||'删除失败') } },
    async loadList(){ this.loadingList=true; try{ const d=await fetchJSON('/monitor/list'); this.monitoredList=d.series||[] }catch(e){}finally{ this.loadingList=false } },
    async refreshList(){ this.refreshing=true; await this.loadList(); this.refreshing=false },
    async loadConfig(){ try{ const d=await fetchJSON('/config'); this.config={...this.config,...d} }catch(e){} },
    async saveConfig(){ try{ const payload={...this.config,check_interval_minutes:Number(this.config.check_interval_minutes)||30}; await fetchJSON('/config',{method:'PUT',body:JSON.stringify(payload)}); ElementPlus.ElMessage.success('保存成功'); this.showSettings=false; await this.loadStatus() }catch(e){ ElementPlus.ElMessage.error(e.message||'保存失败') } },
    async testConfig(){ try{ const d=await fetchJSON('/config/test',{method:'POST'}); d.success ? ElementPlus.ElMessage.success(d.message||'测试消息已发送') : ElementPlus.ElMessage.error(d.error||'测试失败') }catch(e){ ElementPlus.ElMessage.error(e.message||'测试失败') } },
    async loadStatus(){ try{ this.monitorStatus=await fetchJSON('/monitor/status') }catch(e){} },
    async loadLogs(){ try{ this.logs=await fetchJSON('/monitor/logs?limit=50') }catch(e){} },
    fmtTime2(t){ if(!t) return '-'; return new Date(t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) },
    daysUntil(dateStr){ if(!dateStr) return ''; const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const p=dateStr.split('-'); const target=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); const diff=Math.round((target-today)/86400000); if(diff<0)return'已播出'; if(diff===0)return'今天'; if(diff===1)return'明天'; return diff+'天后' }
  }
}

// ---- Router ----
const routes = [
  {path:'/',component:Dashboard},
  {path:'/users',component:Users},
  {path:'/libraries',component:Libraries},
  {path:'/nfo',component:NfoGenerator},
  {path:'/monitor',component:Monitor},
]
const router = VueRouter.createRouter({
  history:VueRouter.createWebHashHistory(),
  routes,
  scrollBehavior(){ return {top:0,left:0} }
})

const app = Vue.createApp({})
app.use(router)
app.use(ElementPlus)
app.mount('#app')
</script>
</body>
</html>
