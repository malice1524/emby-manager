<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Emby Manager</title>
<link rel="icon" href="lib/favicon.png">
<link rel="stylesheet" href="lib/element-plus.css"/>
<script src="lib/vue.js"></script>
<script src="lib/vue-router.js"></script>
<script src="lib/element-plus.js"></script>

<style>
/* Using system fonts for offline reliability */

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0a0a14;
  --surface: rgba(255,255,255,0.03);
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.15);
  --text: #e8e8f0;
  --text-dim: rgba(255,255,255,0.5);
  --text-muted: rgba(255,255,255,0.35);
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.4);
  --accent2: #a29bfe;
  --green: #00cec9;
  --green-glow: rgba(0,206,201,0.4);
  --pink: #fd79a8;
  --pink-glow: rgba(253,121,168,0.4);
  --orange: #fdcb6e;
  --orange-glow: rgba(253,203,110,0.4);
  --red: #ff7675;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Background ambient */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,92,231,0.12), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(0,206,201,0.08), transparent),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(253,121,168,0.06), transparent);
}

/* ---- Layout ---- */
.layout { display: flex; min-height: 100dvh; position: relative; z-index: 1 }

/* ---- Sidebar ---- */
.sidebar {
  width: 240px; min-height: 100dvh;
  background: rgba(10,10,20,0.85);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-right: 1px solid var(--glass-border);
  padding: 28px 0;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 90;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 0 24px; margin-bottom: 36px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.sidebar-logo h2 {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: -0.3px;
}
.sidebar nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 24px; margin: 2px 12px;
  color: var(--text-dim); text-decoration: none;
  font-size: 14px; font-weight: 450;
  border-radius: 10px; transition: all var(--transition);
}
.sidebar nav a:hover { color: var(--text); background: var(--glass); }
.sidebar nav a.router-link-active {
  color: #fff; background: rgba(108,92,231,0.15);
  box-shadow: inset 0 0 0 1px rgba(108,92,231,0.25);
}
.sidebar nav a .nav-icon { font-size: 18px; opacity: 0.7; width: 20px; text-align: center }
.sidebar nav a.router-link-active .nav-icon { opacity: 1 }

.sidebar-version {
  position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px;
  padding: 8px 0;
}

.main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: 100% }

/* ---- Mobile ---- */
.topbar { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: 260px; top: 0; z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .sidebar .sidebar-logo { padding-top: 4px; }
  .main { margin-left: 0; padding: 16px 14px; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; position: sticky; top: 0; z-index: 150;
    background: rgba(10,10,20,0.8);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
  }
  .topbar .menu-btn { font-size: 20px; cursor: pointer; color: var(--text); line-height: 1; }
  .topbar h2 { font-size: 16px; font-weight: 600; }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 180;
  }
  .sidebar-overlay.show { display: block; }
  .el-dialog.is-fullscreen { z-index: 2001 !important; }
  .el-overlay { z-index: 2000 !important; }
}

/* ---- Glass Card ---- */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
  transition: all var(--transition);
}
.glass-card:hover {
  border-color: var(--glass-border-hover);
  background: var(--glass-hover);
}

/* ---- Monitor search results ---- */
.monitor-search-bar { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
.monitor-search-input { flex: 1 1 220px; min-width: 180px; height: 40px; padding: 0 14px; font-size: 14px; line-height: 40px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); outline: none; transition: border-color var(--transition), background var(--transition); }
.monitor-search-input:focus { border-color: rgba(108,92,231,0.55); background: rgba(255,255,255,0.06); }
.monitor-search-btn.el-button { height: 40px; min-width: 96px; padding: 0 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 600; background: var(--accent); border-color: var(--accent); box-shadow: 0 8px 22px rgba(108,92,231,0.18); }
.monitor-search-btn.el-button:hover, .monitor-search-btn.el-button:focus { background: #7a6cf0; border-color: #7a6cf0; }
.monitor-search-results { margin-top: 12px; display: grid; gap: 8px; max-width: 100%; overflow: hidden; }
.monitor-search-results-header { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2px 2px 4px; font-size:12px; color:var(--text-dim); }
.monitor-search-clear { border:0; background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; padding:4px 6px; border-radius:6px; }
.monitor-search-clear:hover { color:var(--text); background:var(--glass); }
.monitor-search-result-item { display: flex; align-items: center; gap: 12px; min-width: 0; max-width: 100%; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(255,255,255,0.03); cursor: pointer; }
.monitor-search-poster { width: 42px; height: 63px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.monitor-search-poster-placeholder { width: 42px; height: 63px; border-radius: 6px; background: var(--glass); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.monitor-search-body { flex: 1 1 auto; min-width: 0; max-width: 100%; overflow: hidden; }
.monitor-search-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.monitor-search-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.monitor-search-overview { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.35; overflow: hidden; display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient: vertical; overflow-wrap:anywhere; word-break: break-word; }
.monitor-list-card { padding: 16px; display: flex; flex-direction: column; max-height: clamp(360px, 58dvh, 680px); min-height: 260px; }
.monitor-list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; flex-wrap:wrap; flex-shrink:0; }
.monitor-list-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding-right: 4px; margin-right: -4px; }
.monitor-list-scroll::-webkit-scrollbar { width: 6px; }
.monitor-list-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; }
.monitor-list-scroll::-webkit-scrollbar-track { background: transparent; }
.monitor-list-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--glass-border); }
.monitor-list-item:last-child { border-bottom: 0; }
.monitor-cache-hint { margin-left: 8px; font-size: 11px; color: var(--text-muted); font-weight: 400; }
.monitor-refresh-btn.el-button { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text); background: var(--glass); border: 1px solid var(--glass-border); box-shadow: none; }
.monitor-refresh-btn.el-button:hover, .monitor-refresh-btn.el-button:focus { color: #fff; background: var(--glass-hover); border-color: var(--glass-border-hover); }
.monitor-refresh-btn.el-button.is-disabled { color: var(--text-dim); background: var(--glass); border-color: var(--glass-border); opacity: 0.75; }
.monitor-refresh-icon { display: inline-flex; align-items: center; justify-content: center; line-height: 1; transition: transform var(--transition); }
.monitor-refresh-icon.spinning { animation: monitor-refresh-spin 0.8s linear infinite; }
@keyframes monitor-refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  .monitor-search-bar { gap: 8px; }
  .monitor-search-input { flex-basis: 100%; }
  .monitor-search-btn.el-button { flex: 1 1 100%; width: 100%; }
  .monitor-search-result-item { align-items: flex-start; gap: 10px; }
  .monitor-search-result-item .el-button { padding: 6px 8px; }
  .monitor-list-card { max-height: 56dvh; }
  .monitor-list-item { align-items: flex-start; }
}

.nfo-input { width:100%; max-width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:8px; color:var(--text); outline:none; min-width:0; }
.nfo-textarea { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:8px; color:var(--text); outline:none; resize:vertical; }
.nfo-pornhub-fields { display:grid; grid-template-columns:minmax(0,2fr) minmax(120px,auto); gap:10px; margin-bottom:10px; min-width:0; max-width:100%; overflow:hidden; }
@media (max-width: 640px) { .nfo-pornhub-fields { grid-template-columns:1fr; } }
.nfo-published-scroll { max-height:360px; overflow-y:auto; display:grid; gap:8px; padding-right:4px; margin-right:-4px; }
.nfo-published-row { display:grid; grid-template-columns:auto minmax(150px,1fr) minmax(220px,1.4fr) minmax(90px,auto); gap:8px; align-items:center; padding:10px; border:1px solid var(--glass-border); border-radius:10px; background:rgba(255,255,255,0.03); min-width:0; }
.nfo-published-title { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; color:var(--text); }
.nfo-published-url { height:38px; }
.nfo-published-status { min-width:0; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
@media (max-width: 700px) { .nfo-published-row { grid-template-columns:auto minmax(0,1fr); } .nfo-published-url, .nfo-published-status { grid-column:2 / -1; } }
.nfo-image-plan-row { display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--glass-border); border-radius:10px; background:rgba(255,255,255,0.03); font-size:13px; min-width:0; max-width:100%; overflow:hidden; }
.nfo-missing-lists { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-bottom:12px; }
.nfo-missing-box { min-width:0; border:1px solid var(--glass-border); border-radius:12px; background:rgba(255,255,255,0.03); padding:10px; }
.nfo-missing-scroll { max-height:180px; overflow-y:auto; display:grid; gap:6px; }
.nfo-missing-item { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:var(--text-dim); padding:6px 8px; border-radius:8px; background:rgba(255,255,255,0.03); }
@media (max-width: 700px) { .nfo-missing-lists { grid-template-columns:1fr; } }
.nfo-image-plan-source, .nfo-image-plan-target { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nfo-image-plan-source { flex:0 1 42%; }
.nfo-image-plan-arrow { flex:0 0 auto; color:var(--text-dim); }
.nfo-image-plan-target { flex:1 1 0; }

/* ============ DASHBOARD — Gallery Style ============ */

/* Hero banner */
.hero {
  position: relative; overflow: hidden;
  border-radius: 20px; margin-bottom: 28px;
  padding: 36px 32px;
  background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.08));
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}
.hero::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 100% at 30% 20%, rgba(108,92,231,0.12), transparent),
              radial-gradient(ellipse 50% 100% at 80% 50%, rgba(0,206,201,0.06), transparent);
}
.hero-server {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  position: relative; z-index: 1;
}
.hero-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #4834d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 20px rgba(108,92,231,0.4);
}
.hero-server h2 { font-size: 20px; font-weight: 600; }
.hero-server span { font-size: 12px; color: var(--text-muted); }

.hero-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  position: relative; z-index: 1;
}
@media (max-width: 480px) { .hero-stats { grid-template-columns: repeat(2,1fr); } }
.hero-stat {
  text-align: center; padding: 12px 8px;
  border-radius: 12px; background: rgba(255,255,255,0.03);
  border: 1px solid transparent;
  transition: all 0.25s ease;
}
.hero-stat:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.05); }
.hero-stat .val {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8f0 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-stat .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ---- Section Title ---- */
.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px;
}

/* ---- Poster Grid (Recently Added) ---- */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px; margin-bottom: 28px;
}
@media (max-width: 480px) { .poster-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; } }

.poster-card {
  position: relative; border-radius: 10px; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center center;
}
.poster-card:hover {
  transform: scale(1.06); z-index: 10;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--glass-border-hover);
  border-color: rgba(255,255,255,0.2);
}
.poster-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.poster-card:hover img { transform: scale(1.1); }

.poster-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
  pointer-events: none;
}
.poster-overlay .tt {
  font-size: 12px; font-weight: 600; color: #fff;
  line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.poster-overlay .yr {
  font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px;
}
.poster-type {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  font-size: 9px; padding: 3px 8px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: #fff; letter-spacing: 0.5px;
}
.poster-type.series { background: rgba(0,206,201,0.7); }
.poster-type.movie { background: rgba(108,92,231,0.7); }

.poster-placeholder {
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--text-muted);
}

/* ---- Activity Feed ---- */
.activity-feed {
  display: flex; flex-direction: column; gap: 0;
  max-height: 320px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent;
}
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px;
  transition: background 0.15s ease;
  font-size: 13px;
}
.activity-item:hover { background: var(--glass); }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
}
.activity-item .act-text { flex: 1; color: var(--text-dim); line-height: 1.4; }
.activity-item .act-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

/* ---- Sessions Row ---- */
.sessions-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}

/* ---- Now Playing ---- */
.nowplaying-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 10px;
  border-bottom: 1px solid var(--glass-border);
  transition: background 0.2s ease;
}
.nowplaying-item:last-child { border-bottom: none; }
.nowplaying-item:hover { background: var(--glass); }

.np-poster {
  width: 44px; height: 66px; border-radius: 6px; overflow: hidden; flex-shrink: 0;
  background: var(--glass); border: 1px solid var(--glass-border);
}
.np-poster img { width:100%; height:100%; object-fit:cover; }
.np-poster-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-muted); }

.np-info { flex: 1; min-width:0; }
.np-user { font-size:13px; font-weight:600; color:var(--text); }
.np-title { font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:2px 0 6px; }
.np-progress { display:flex; align-items:center; gap:6px; }
.np-bar-bg { flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.np-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.5s ease; }
.np-pct { font-size:10px; color:var(--text-muted); min-width:32px; text-align:right; }

.np-status { font-size:18px; flex-shrink:0; }
.np-status.playing { color:var(--green); }
.np-status.paused { color:var(--orange); }
.np-status.idle { color:var(--text-muted); }
.session-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 24px;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.2s ease; font-size: 12px;
}
.session-chip:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); }
.session-chip .u-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), #6c5ce7);
  color: #fff; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.session-chip .u-info { line-height: 1.3; }
.session-chip .u-name { font-weight: 600; color: var(--text); }
.session-chip .u-device { font-size: 10px; color: var(--text-muted); }

/* ---- Library Filter Chips ---- */
.lib-filter {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.dashboard-library-filter {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px;
  margin-bottom: 16px; width: 100%;
}
.filter-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-dim); transition: all 0.2s ease;
  user-select: none; -webkit-user-select: none; white-space: nowrap;
}
.dashboard-library-filter .filter-chip { text-align: center; padding: 7px 10px; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.filter-chip:hover { border-color: var(--glass-border-hover); color: var(--text); }
.filter-chip.active {
  background: rgba(108,92,231,0.2); border-color: var(--accent);
  color: #fff;
}

/* Two column for sections */
.dash-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
@media (max-width: 768px) { .dash-sections { grid-template-columns: 1fr; } }

/* Glass card for sections */
.glass-block {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ---- Library Grid ---- */

async function fetchJSON(url, opts = {}) {
  const headers = {...(opts.headers||{})}
  if (!(opts.body instanceof FormData) && !headers['Content-Type']) headers['Content-Type'] = 'application/json'
  const res = await fetch(API+url, {...opts, headers})
  if (!res.ok) { const e = await res.json().catch(()=>({})); let detail=e.detail||res.statusText; if(Array.isArray(detail)) detail=detail.map(i=>i.msg||JSON.stringify(i)).join('; '); else if(detail && typeof detail==='object') detail=JSON.stringify(detail); throw new Error(detail) }
  return res.json()
}

  data(){

      showDetail: false, detailItem: null, expanded: false, showDetailDel: false, showLibDel: false,
      isMobile: window.innerWidth < 640,
      libraries: [], activeLibrary: '', libraryName: '', _excludeIds: ''
    }
  },
  computed: {
    activePlaying(){
      if(!this.data.sessions?.streams) return []
      return this.data.sessions.streams.filter(s => s.has_playing)
    },
    idleCount(){
      if(!this.data.sessions?.streams) return 0
      return this.data.sessions.streams.filter(s => !s.has_playing).length
    },
    homeProgressPercent(){
      const uploadPercent = Number(this.metubeStatus.progress?.percent || 0)
      if(this.metubeStatus.progress?.filename) return Math.max(0,Math.min(100,uploadPercent)).toFixed(2)
      const m = this.metubeStatus.metube || {}
      const total = Number(m.total || 0)
      const finished = Number(m.finished || 0)
      if(total > 0) return Math.max(0,Math.min(100,finished * 100 / total)).toFixed(2)
      return '0.00'
    },
    homeProgressLabel(){
      if(this.metubeStatus.progress?.filename) return '正在上传：' + this.metubeStatus.progress.filename
      if(this.metubeStatus.available===false) return 'MeTube 状态不可用，点击检查设置'
      const m = this.metubeStatus.metube || {}
      if(Number(m.total||0) > 0) return '下载整体进度：已完成 ' + (m.finished||0) + ' / ' + (m.total||0)
      return '暂无上传任务'
    }
  },
  async mounted(){
    window.addEventListener('resize', ()=>{ this.isMobile = window.innerWidth < 640 })
    await this.refreshAll()
    this._poll = setInterval(() => this.refreshStats(), 15000)
  },
  beforeUnmount(){ if(this._poll) clearInterval(this._poll) },
  methods: {
    async refreshAll(){
      try {
        const [ov, rec, act, libs, mt] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/recent?limit=18'),
          fetchJSON('/dashboard/stats'),
          fetchJSON('/libraries'),
          fetchJSON('/dashboard/metube').catch(e=>({available:false,error:e.message,progress:{},metube:{},uploader:{statuses:{}},failed:[]})),
        ])
        this.data = ov
        this.metubeStatus = mt
        this.activity = (act.activity || []).slice(0, 8)
        this.libraries = (libs.libraries || []).filter(function(l) {
          return l.name !== '欧美自拍' && l.name !== '亚洲自拍' && l.name !== '日本有码'
        })
        // Find excluded library IDs
        var allLibs = libs.libraries || []
        var excludeNames = {'欧美自拍':1,'亚洲自拍':1,'日本有码':1}
        this._excludeIds = allLibs.filter(function(l){return excludeNames[l.name]}).map(function(l){return l.id}).join(',')
        // Set default to 欧美电影
        var defaultLibId = ''
        for(var i=0;i<allLibs.length;i++){if(allLibs[i].name==='欧美电影'){defaultLibId=allLibs[i].id;break}}
        // Fetch recent with default library
        try {
          var url = '/dashboard/recent?limit=18'
          if(defaultLibId) url += '&parent_id='+defaultLibId
          else if(this._excludeIds) url += '&exclude_parent_ids='+this._excludeIds
          const r2 = await fetchJSON(url)
          this.recent = r2.items || []
          this.activeLibrary = defaultLibId
          this.libraryName = defaultLibId ? '欧美电影' : ''
        } catch(e) {}
      } catch(e) { console.error(e) }
      this.loaded = true
    },
    async refreshStats(){
      try {
        const [ov, act, mt] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/stats'),
          fetchJSON('/dashboard/metube').catch(e=>({available:false,error:e.message,progress:{},metube:{},uploader:{statuses:{}},failed:[]})),
        ])
        this.data = ov
        this.metubeStatus = mt
        this.activity = (act.activity || []).slice(0, 8)
      } catch(e) { /* silent */ }
    },
    async filterLibrary(id, name){
      this.activeLibrary = id; this.libraryName = name || '';
      try {
        var url = '/dashboard/recent?limit=18'
        if(id) url += '&parent_id='+id
        const rec = await fetchJSON(url)
        this.recent = rec.items || []
      } catch(e) { console.error(e) }
    },
    goDownloadUpload(){ this.$router.push('/download-upload') },
    fmtTime(d){ if(!d)return''; const t=new Date(d); return t.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) },
    openUrl(url){ window.open(url, '_blank') },
    async deleteDetailItem(){
      if(!this.detailItem || !this.detailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.detailItem.id, {method:'DELETE'})
        this.recent = this.recent.filter(item => item.id !== this.detailItem.id)
        ElementPlus.ElMessage.success('已删除')
        this.showDetailDel = false
        this.showDetail = false
        setTimeout(() => this.refreshAll(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showDetailDel = false }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        const res = await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error('删除失败'); this.showLibDel = false }
    },
    async openItem(item){
      this.showDetail = true; this.expanded = false
      this.detailItem = item
      this.detailItem = item  // show basic info first
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id)
        this.detailItem = detail
      } catch(e) { /* keep basic info */ }
    }
  }
}

    </div>
  `,
  data(){
    return {
      libraries:[], showItems:false, curLib:null,
      items:[], itemsLoading:false, total:0, page:1, pageSize:30, search:'',
      isMobile: window.innerWidth < 640,
      showDetail:false, libDetailItem:null, libExpanded:false, showLibDel:false,
      _searchTimer:null
    }
  },
  async mounted(){
    const d=await fetchJSON('/libraries'); this.libraries=d.libraries||[];
    window.addEventListener('resize',()=>{this.isMobile=window.innerWidth<640})
  },
  methods: {
    libCountText(lib){
      const counts = lib.counts || {}
      if(lib.type === 'tvshows') return (counts.series || 0) + ' 部剧集'
      if(lib.type === 'movies') return (counts.movies || 0) + ' 部电影'
      return (counts.total || 0) + ' 个媒体'
    },
    libSubCountText(lib){
      return '点击查看全部'
    },
    openUrl(url){ window.open(url, '_blank') },
    async openLib(lib){
      this.curLib=lib; this.page=1; this.search=''; this.showItems=true;
      await this.loadItems()
    },
    onSearch(){
      if(this._searchTimer) clearTimeout(this._searchTimer);
      this._searchTimer = setTimeout(() => { this.page=1; this.loadItems() }, 400)
    },
    async loadItems(){
      if(!this.curLib)return; this.itemsLoading=true;
      const params = new URLSearchParams({page:this.page-1, limit:this.pageSize});
      if(this.search) params.set('search', this.search);
      if(this.curLib.type) params.set('types', this.curLib.type);
      const data = await fetchJSON('/libraries/'+this.curLib.id+'/items?'+params);
      this.items=data.items||[]; this.total=data.total||0;
      this.itemsLoading=false;
    },
    async openLibItem(item){
      this.showDetail=true; this.libExpanded=false; this.showLibDel=false;
      this.libDetailItem=item;
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id);
        this.libDetailItem = detail;
      } catch(e) { /* keep basic */ }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        this.items = this.items.filter(item => item.id !== this.libDetailItem.id)
        if(this.total > 0) this.total -= 1
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showLibDel = false }
    }
  }
}

    async loadLogs(){ try{ this.logs=await fetchJSON('/monitor/logs?limit=50') }catch(e){} },
    fmtTime2(t){ if(!t) return '-'; return new Date(t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) },
    daysUntil(dateStr){ if(!dateStr) return ''; const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const p=dateStr.split('-'); const target=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); const diff=Math.round((target-today)/86400000); if(diff<0)return'已播出'; if(diff===0)return'今天'; if(diff===1)return'明天'; return diff+'天后' }
  }
}

    defaultMediaTv(path){ return {title:this.actorNameFromPath(path),plot:'',outline:'',tmdb_id:'',dateadded:'',sorttitle:'',tags:'',displayorder:'aired',lockdata:false,overwrite:true} },
    applyActorInfo(path,d){ const tv=d.tvshow||{}; this.mediaInfo={loading:false,loaded:true,error:'',tvshow_exists:!!d.tvshow_exists,poster_exists:!!d.poster_exists,fanart_exists:!!d.fanart_exists,logo_exists:!!d.logo_exists}; this.mediaTv={...this.defaultMediaTv(path),title:tv.title||this.actorNameFromPath(path),plot:tv.plot||'',outline:tv.outline||'',tmdb_id:tv.tmdb_id||'',dateadded:tv.dateadded||'',sorttitle:tv.sorttitle||'',tags:(tv.tags||[]).join(', '),displayorder:tv.displayorder||'aired',lockdata:!!tv.lockdata,overwrite:true} },
    async loadActorInfo(path){ this.mediaInfo={loading:true,loaded:false,error:'',tvshow_exists:false,poster_exists:false,fanart_exists:false,logo_exists:false}; this.mediaTv=this.defaultMediaTv(path); try{ const d=await fetchJSON('/media-organizer/actor-info',{method:'POST',body:JSON.stringify({actor_dir:path})}); this.applyActorInfo(path,d); if(d.tvshow_exists) ElementPlus.ElMessage.success('已读取已有 tvshow.nfo') }catch(e){ this.mediaInfo={loading:false,loaded:false,error:e.message||'读取已有信息失败',tvshow_exists:false,poster_exists:false,fanart_exists:false,logo_exists:false}; this.syncMediaTitle() } },
    async openBrowse(field,root){ this.browsePicker.visible=true; this.browsePicker.field=field; this.browsePicker.root=root; localStorage.setItem('mediaOrganizerBrowseRoot', root); await this.browsePath(this[field]||'') },
    async browseRoot(){ await this.browsePath('') },
    async browsePath(path){ this.browsePicker.loading=true; this.browsePicker.error=''; try{ const query='?root='+encodeURIComponent(this.browsePicker.root)+(path?'&path='+encodeURIComponent(path):''); const d=await fetchJSON('/media-organizer/browse'+query); this.browsePicker.current=d.path; this.browsePicker.parent=d.parent||''; this.browsePicker.directories=d.directories||[] }catch(e){ this.browsePicker.error=e.message||'目录浏览失败' }finally{ this.browsePicker.loading=false } },
    async selectBrowsePath(path){ if(!path) return; this[this.browsePicker.field]=path; if(this.browsePicker.field==='mediaDir'){ await this.loadActorInfo(path) } if(this.browsePicker.field==='targetDir'){ if(!this.actorName) this.actorName=this.actorNameFromPath(path); this.suggestNextEpisode() } if(this.browsePicker.field==='metadataSourceDir'||this.browsePicker.field==='metadataTargetDir'){ this.metadataPrecheckOk=false; this.metadataResult='' } this.browsePicker.visible=false },
    async saveTvshow(){ if(!this.mediaDir) return ElementPlus.ElMessage.warning('请先选择目录'); this.savingTvshow=true; try{ const payload={actor_dir:this.mediaDir,title:(this.mediaTv.title||this.actorNameFromPath(this.mediaDir)).trim(),plot:this.mediaTv.plot||'',outline:this.mediaTv.outline||'',tmdb_id:this.mediaTv.tmdb_id||'',dateadded:this.mediaTv.dateadded||'',sorttitle:this.mediaTv.sorttitle||'',tags:this.parseMediaTags(this.mediaTv.tags),chinese_tags_only:false,displayorder:this.mediaTv.displayorder||'aired',lockdata:!!this.mediaTv.lockdata,overwrite:!!this.mediaTv.overwrite}; const d=await fetchJSON('/media-organizer/tvshow',{method:'POST',body:JSON.stringify(payload)}); ElementPlus.ElMessage.success('已生成 tvshow.nfo'); await this.loadActorInfo(this.mediaDir); return d }catch(e){ ElementPlus.ElMessage.error(e.message||'生成 tvshow.nfo 失败') }finally{ this.savingTvshow=false } },
    async uploadArtwork(kind, event){ if(!this.mediaDir) return ElementPlus.ElMessage.warning('请先选择目录'); const file=(event && event.target && event.target.files && event.target.files[0]) || null; if(!file) return; this.uploadingArtwork[kind]=true; try{ const fd=new FormData(); fd.append('actor_dir', this.mediaDir); fd.append('kind', kind); fd.append('overwrite', String(!!this.mediaTv.overwrite)); fd.append('image', file); await fetchJSON('/media-organizer/upload-artwork',{method:'POST',body:fd}); ElementPlus.ElMessage.success(kind==='poster'?'poster.jpg 已上传':kind==='fanart'?'fanart.jpg 已上传':'logo.png 已上传'); await this.loadActorInfo(this.mediaDir) }catch(e){ ElementPlus.ElMessage.error(e.message||'上传图片失败') }finally{ this.uploadingArtwork[kind]=false; if(event && event.target) event.target.value='' } },
    async suggestNextEpisode(){ if(!this.targetDir) return; try{ const d=await fetchJSON('/media-organizer/suggest-next-episode',{method:'POST',body:JSON.stringify({target_dir:this.targetDir,season:this.season||1})}); this.startEpisode=d.next_episode||1; this.episodeHint=d.matched_count ? '已根据目标目录 S'+String(this.season||1).padStart(2,'0')+' 最大 E'+String(d.max_episode).padStart(2,'0')+'，建议从 E'+String(d.next_episode).padStart(2,'0')+' 开始' : '目标目录未找到当前季已有集数，建议从 E01 开始' }catch(e){ this.episodeHint='' } },
    moveItem(index,delta){ const next=index+delta; if(next<0||next>=this.items.length) return; const copy=[...this.items]; const item=copy.splice(index,1)[0]; copy.splice(next,0,item); this.items=copy; this.precheckOk=false; this.precheckResult='' },
    async scan(){ this.loading=true; try{ const d=await fetchJSON('/media-organizer/scan',{method:'POST',body:JSON.stringify({source_dir:this.sourceDir,recursive:this.recursive,sort:this.sort})}); this.items=(d.items||[]).map((i,idx)=>({...i,chinese_title:i.title,status:i.suspected_organized?'疑似已整理':'待翻译',episode:this.startEpisode+idx})); if(!this.actorName&&this.targetDir) this.actorName=this.actorNameFromPath(this.targetDir); ElementPlus.ElMessage.success('扫描完成') }catch(e){ ElementPlus.ElMessage.error(e.message||'扫描失败') }finally{ this.loading=false } },
    async translate(){ this.translating=true; try{ const rows=this.items.map(i=>({id:i.id,title:i.title})); const d=await fetchJSON('/media-organizer/translate',{method:'POST',body:JSON.stringify({items:rows})}); const map={}; (d.items||[]).forEach(r=>map[r.id]=r); this.items=this.items.map(i=>map[i.id]?{...i,chinese_title:map[i.id].title||i.chinese_title,status:map[i.id].ok?(map[i.id].skipped?'已是中文':'已翻译'):'翻译失败: '+map[i.id].error}:i); ElementPlus.ElMessage.success('翻译完成') }catch(e){ ElementPlus.ElMessage.error(e.message||'翻译失败') }finally{ this.translating=false } },
    plannedItems(){ return this.items.map((i,idx)=>{ const ep=this.startEpisode+idx; const title=i.chinese_title||i.title; const base=(this.actorName||'Actor')+'.S'+String(this.season).padStart(2,'0')+'E'+String(ep).padStart(2,'0')+'.'+title; const targetBase=this.targetDir.replace(/\/$/,'')+'/'+base; const row={id:i.id,source_path:i.path,target_path:targetBase+i.suffix}; if(i.artwork_path&&i.artwork_suffix){ row.artwork_path=i.artwork_path; row.target_artwork_path=targetBase+i.artwork_suffix } if(this.generateNfo){ row.target_nfo_path=targetBase+'.nfo'; row.nfo={title:title,season:this.season,episode:ep,published_date:i.published_date||'',plot:i.clean_title||i.title||''} } return row }) },
    async precheck(){ try{ const d=await fetchJSON('/media-organizer/precheck',{method:'POST',body:JSON.stringify({confirmed:this.confirmed,items:this.plannedItems()})}); this.precheckOk=!!d.ok; this.precheckResult=JSON.stringify(d,null,2); d.ok?ElementPlus.ElMessage.success('预检查通过'):ElementPlus.ElMessage.warning('预检查未通过') }catch(e){ ElementPlus.ElMessage.error(e.message||'预检查失败') } },
    async execute(){ this.executing=true; try{ const d=await fetchJSON('/media-organizer/execute',{method:'POST',body:JSON.stringify({confirmed:this.confirmed,items:this.plannedItems()})}); this.precheckResult=JSON.stringify(d,null,2); d.ok?ElementPlus.ElMessage.success('执行完成'):ElementPlus.ElMessage.warning('部分失败，可修改后重试') }catch(e){ ElementPlus.ElMessage.error(e.message||'执行失败') }finally{ this.executing=false } },
    metadataPayload(){ return {source_dir:this.metadataSourceDir,target_dir:this.metadataTargetDir,confirmed:true} },
    async metadataPrecheck(){ if(!this.metadataSourceDir||!this.metadataTargetDir) return ElementPlus.ElMessage.warning('请先选择 NAS 和 115 演员目录'); this.metadataChecking=true; this.metadataPrecheckOk=false; try{ const d=await fetchJSON('/media-organizer/metadata/precheck',{method:'POST',body:JSON.stringify(this.metadataPayload())}); this.metadataPrecheckOk=!!d.ok; this.metadataResult=JSON.stringify(d,null,2); d.ok?ElementPlus.ElMessage.success('预检查完成，共 '+(d.items||[]).length+' 个元数据文件'):ElementPlus.ElMessage.warning(d.error||'没有可复制的元数据') }catch(e){ ElementPlus.ElMessage.error(e.message||'预检查失败') }finally{ this.metadataChecking=false } },
    async metadataExecute(){ if(!this.metadataSourceDir||!this.metadataTargetDir) return ElementPlus.ElMessage.warning('请先选择 NAS 和 115 演员目录'); this.metadataCopying=true; try{ const d=await fetchJSON('/media-organizer/metadata/execute',{method:'POST',body:JSON.stringify(this.metadataPayload())}); this.metadataPrecheckOk=!!d.ok; this.metadataResult=JSON.stringify(d,null,2); d.ok?ElementPlus.ElMessage.success('元数据已复制到 115'):ElementPlus.ElMessage.warning(d.error||'部分元数据复制失败') }catch(e){ ElementPlus.ElMessage.error(e.message||'复制失败') }finally{ this.metadataCopying=false } }
  }
}

// ---- Download / Upload Monitor ----
const DownloadUpload = {
  template: `
    <div class="du-page fade-in">
      <div>
        <div class="section-title" style="margin-bottom:8px">⬆️ 下载上传</div>
        <div class="du-subtitle">MeTube 下载队列与 115 上传进度监控</div>
      </div>

      <div v-if="!loaded" class="empty-state" style="padding:24px">加载中...</div>
      <div v-else-if="!data.available" class="glass-card" style="padding:18px;color:var(--red)">{{data.error || 'MeTube 状态不可用'}}</div>

      <div class="du-grid" v-if="loaded">
        <section class="du-progress-card">
          <div class="du-card-head">
            <div>
              <div class="du-eyebrow">115 Upload Now</div>
              <div class="du-file">{{progress.filename || '暂无上传任务'}}</div>
            </div>
            <div class="du-badge">{{statusLabel(progress.status)}}</div>
          </div>
          <div class="du-pct-row">
            <div class="du-percent">{{percentText}}%</div>
            <div class="du-bytes">{{formatBytes(progress.uploaded_bytes)}} / {{formatBytes(progress.total_bytes)}}<br>{{progress.updated_at || '-'}}</div>
          </div>
          <div class="du-progress-bg"><div class="du-progress-fill" :style="'width:'+percentText+'%'"></div></div>
          <div class="du-meta-grid">
            <div class="du-meta"><b>{{progress.status || '-'}}</b><span>当前状态</span></div>
            <div class="du-meta"><b>{{formatBytes(progress.total_bytes)}}</b><span>文件大小</span></div>
            <div class="du-meta"><b>115</b><span>目标网盘</span></div>
          </div>
          <div class="du-steps">
            <div class="du-step" :class="stepClass('starting')"><span class="du-step-dot"></span>文件稳定，准备上传</div>
            <div class="du-step" :class="stepClass('computing_sha1')"><span class="du-step-dot"></span>SHA1 计算</div>
            <div class="du-step" :class="stepClass('uploading')"><span class="du-step-dot"></span>正在分片上传</div>
            <div class="du-step" :class="stepClass('upload_returned')"><span class="du-step-dot"></span>上传返回，等待 115 确认</div>
            <div class="du-step" :class="stepClass('confirmed')"><span class="du-step-dot"></span>确认后删除本地</div>
          </div>
        </section>

        <aside class="du-side-card">
          <div class="section-title" style="margin-bottom:12px">下载与上传概览</div>
          <div class="du-stats">
            <div class="du-stat"><b>{{metube.finished||0}}</b><span>已完成</span></div>
            <div class="du-stat"><b>{{metube.downloading||0}}</b><span>下载中</span></div>
            <div class="du-stat"><b>{{metube.pending||0}}</b><span>待下载</span></div>
          </div>
          <div class="du-state-list">
            <div class="du-state-row"><span>已确认并删本地</span><b class="du-ok">{{statusCount('deleted_local_after_confirm')}}</b></div>
            <div class="du-state-row"><span>等待 115 确认</span><b class="du-warn">{{statusCount('waiting_remote_confirm')}}</b></div>
            <div class="du-state-row"><span>未稳定/下载中</span><b>{{statusCount('unstable')}}</b></div>
            <div class="du-state-row"><span>上传失败</span><b class="du-bad">{{statusCount('upload_failed')}}</b></div>
          </div>
        </aside>
      </div>

      <section class="du-failed-card" v-if="loaded">
        <div class="section-title" style="margin-bottom:10px">⚠️ 失败项</div>
        <div v-if="failed.length">
          <div class="du-failed-item" v-for="item in failed" :key="item.filename">
            <div class="du-failed-name">{{item.filename}}</div>
            <div class="du-failed-info">{{item.size_text}} · {{item.updated_at}} · {{item.error_type || '上传失败'}}</div>
            <div class="du-error">{{item.error}}</div>
          </div>
        </div>
        <div v-else class="empty-state" style="padding:16px">暂无上传失败</div>
      </section>
    </div>
  `,
  data(){ return {loaded:false,data:{available:true,progress:{},metube:{},uploader:{statuses:{}},failed:[]}} },
  computed:{
    progress(){ return this.data.progress || {} },
    metube(){ return this.data.metube || {} },
    failed(){ return this.data.failed || [] },
    percentText(){ const p=Number(this.progress.percent||0); return Math.max(0,Math.min(100,p)).toFixed(2) }
  },
  async mounted(){ await this.load(); this._poll=setInterval(()=>this.load(true),5000) },
  beforeUnmount(){ if(this._poll) clearInterval(this._poll) },
  methods:{
    async load(silent){ try{ this.data=await fetchJSON('/dashboard/metube') }catch(e){ if(!silent) this.data={available:false,error:e.message,progress:{},metube:{},uploader:{statuses:{}},failed:[]} } finally { this.loaded=true } },
    statusCount(name){ return (this.data.uploader && this.data.uploader.statuses && this.data.uploader.statuses[name]) || 0 },
    formatBytes(bytes){ const n=Number(bytes||0); if(!n) return '0 B'; const u=['B','KB','MB','GB','TB']; let v=n,i=0; while(v>=1024&&i<u.length-1){v/=1024;i++} return i ? v.toFixed(2)+' '+u[i] : Math.round(v)+' B' },
    statusLabel(status){ return ({starting:'准备中',computing_sha1:'计算 SHA1',uploading:'上传中',upload_returned:'等待确认',confirmed:'已确认'})[status] || (status || '暂无任务') },
    stepClass(step){ const order=['starting','computing_sha1','uploading','upload_returned','confirmed']; const cur=this.progress.status||''; const ci=order.indexOf(cur), si=order.indexOf(step); if(ci<0||si<0) return ''; if(si<ci) return 'done'; if(si===ci) return 'active'; return '' }
  }
}

// ---- Router ----
const routes = [
  {path:'/',component:Dashboard},
  {path:'/download-upload',component:DownloadUpload},
  {path:'/users',component:Users},
  {path:'/libraries',component:Libraries},
  
  {path:'/monitor',component:Monitor},
  {path:'/media-organizer',component:FileOrganizer},
  {path:'/settings',component:Settings},
]
const router = VueRouter.createRouter({
  history:VueRouter.createWebHashHistory(),
  routes,
  scrollBehavior(){ return {top:0,left:0} }
})

const app = Vue.createApp({})
app.use(router)
app.use(ElementPlus)
app.mount('#app')
</script>
</body>
</html>
