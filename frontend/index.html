<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Emby Manager</title>
<link rel="icon" href="lib/favicon.png">
<link rel="stylesheet" href="lib/element-plus.css"/>
<script src="lib/vue.js"></script>
<script src="lib/vue-router.js"></script>
<script src="lib/element-plus.js"></script>

<style>
/* Using system fonts for offline reliability */

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0a0a14;
  --surface: rgba(255,255,255,0.03);
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.15);
  --text: #e8e8f0;
  --text-dim: rgba(255,255,255,0.5);
  --text-muted: rgba(255,255,255,0.35);
  --accent: #6c5ce7;
  --accent-glow: rgba(108,92,231,0.4);
  --accent2: #a29bfe;
  --green: #00cec9;
  --green-glow: rgba(0,206,201,0.4);
  --pink: #fd79a8;
  --pink-glow: rgba(253,121,168,0.4);
  --orange: #fdcb6e;
  --orange-glow: rgba(253,203,110,0.4);
  --red: #ff7675;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Background ambient */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,92,231,0.12), transparent),
    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(0,206,201,0.08), transparent),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(253,121,168,0.06), transparent);
}

/* ---- Layout ---- */
.layout { display: flex; min-height: 100dvh; position: relative; z-index: 1 }

/* ---- Sidebar ---- */
.sidebar {
  width: 240px; min-height: 100dvh;
  background: rgba(10,10,20,0.85);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-right: 1px solid var(--glass-border);
  padding: 28px 0;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 90;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 0 24px; margin-bottom: 36px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.sidebar-logo h2 {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: -0.3px;
}
.sidebar nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 24px; margin: 2px 12px;
  color: var(--text-dim); text-decoration: none;
  font-size: 14px; font-weight: 450;
  border-radius: 10px; transition: all var(--transition);
}
.sidebar nav a:hover { color: var(--text); background: var(--glass); }
.sidebar nav a.router-link-active {
  color: #fff; background: rgba(108,92,231,0.15);
  box-shadow: inset 0 0 0 1px rgba(108,92,231,0.25);
}
.sidebar nav a .nav-icon { font-size: 18px; opacity: 0.7; width: 20px; text-align: center }
.sidebar nav a.router-link-active .nav-icon { opacity: 1 }

.sidebar-version {
  position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px;
  padding: 8px 0;
}

.main { margin-left: 240px; flex: 1; padding: 32px 40px; max-width: 100% }

/* ---- Mobile ---- */
.topbar { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); width: 260px; top: 0; z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .sidebar .sidebar-logo { padding-top: 4px; }
  .main { margin-left: 0; padding: 16px 14px; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; position: sticky; top: 0; z-index: 150;
    background: rgba(10,10,20,0.8);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
  }
  .topbar .menu-btn { font-size: 20px; cursor: pointer; color: var(--text); line-height: 1; }
  .topbar h2 { font-size: 16px; font-weight: 600; }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 180;
  }
  .sidebar-overlay.show { display: block; }
  .el-dialog.is-fullscreen { z-index: 2001 !important; }
  .el-overlay { z-index: 2000 !important; }
}

/* ---- Glass Card ---- */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
  transition: all var(--transition);
}
.glass-card:hover {
  border-color: var(--glass-border-hover);
  background: var(--glass-hover);
}

/* ---- Monitor search results ---- */
.monitor-search-bar { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
.monitor-search-input { flex: 1 1 220px; min-width: 180px; height: 40px; padding: 0 14px; font-size: 14px; line-height: 40px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); outline: none; transition: border-color var(--transition), background var(--transition); }
.monitor-search-input:focus { border-color: rgba(108,92,231,0.55); background: rgba(255,255,255,0.06); }
.monitor-search-btn.el-button { height: 40px; min-width: 96px; padding: 0 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 600; background: var(--accent); border-color: var(--accent); box-shadow: 0 8px 22px rgba(108,92,231,0.18); }
.monitor-search-btn.el-button:hover, .monitor-search-btn.el-button:focus { background: #7a6cf0; border-color: #7a6cf0; }
.monitor-search-results { margin-top: 12px; display: grid; gap: 8px; max-width: 100%; overflow: hidden; }
.monitor-search-results-header { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2px 2px 4px; font-size:12px; color:var(--text-dim); }
.monitor-search-clear { border:0; background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; padding:4px 6px; border-radius:6px; }
.monitor-search-clear:hover { color:var(--text); background:var(--glass); }
.monitor-search-result-item { display: flex; align-items: center; gap: 12px; min-width: 0; max-width: 100%; padding: 10px; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(255,255,255,0.03); cursor: pointer; }
.monitor-search-poster { width: 42px; height: 63px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.monitor-search-poster-placeholder { width: 42px; height: 63px; border-radius: 6px; background: var(--glass); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.monitor-search-body { flex: 1 1 auto; min-width: 0; max-width: 100%; overflow: hidden; }
.monitor-search-title { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.monitor-search-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.monitor-search-overview { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.35; overflow: hidden; display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient: vertical; overflow-wrap:anywhere; word-break: break-word; }
.monitor-list-card { padding: 16px; display: flex; flex-direction: column; max-height: clamp(360px, 58dvh, 680px); min-height: 260px; }
.monitor-list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; flex-wrap:wrap; flex-shrink:0; }
.monitor-list-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding-right: 4px; margin-right: -4px; }
.monitor-list-scroll::-webkit-scrollbar { width: 6px; }
.monitor-list-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 999px; }
.monitor-list-scroll::-webkit-scrollbar-track { background: transparent; }
.monitor-list-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--glass-border); }
.monitor-list-item:last-child { border-bottom: 0; }
.monitor-cache-hint { margin-left: 8px; font-size: 11px; color: var(--text-muted); font-weight: 400; }
.monitor-refresh-btn.el-button { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text); background: var(--glass); border: 1px solid var(--glass-border); box-shadow: none; }
.monitor-refresh-btn.el-button:hover, .monitor-refresh-btn.el-button:focus { color: #fff; background: var(--glass-hover); border-color: var(--glass-border-hover); }
.monitor-refresh-btn.el-button.is-disabled { color: var(--text-dim); background: var(--glass); border-color: var(--glass-border); opacity: 0.75; }
.monitor-refresh-icon { display: inline-flex; align-items: center; justify-content: center; line-height: 1; transition: transform var(--transition); }
.monitor-refresh-icon.spinning { animation: monitor-refresh-spin 0.8s linear infinite; }
@keyframes monitor-refresh-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  .monitor-search-bar { gap: 8px; }
  .monitor-search-input { flex-basis: 100%; }
  .monitor-search-btn.el-button { flex: 1 1 100%; width: 100%; }
  .monitor-search-result-item { align-items: flex-start; gap: 10px; }
  .monitor-search-result-item .el-button { padding: 6px 8px; }
  .monitor-list-card { max-height: 56dvh; }
  .monitor-list-item { align-items: flex-start; }
}

.nfo-input { padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:8px; color:var(--text); outline:none; min-width:0; }
.nfo-textarea { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border); border-radius:8px; color:var(--text); outline:none; resize:vertical; }
.nfo-image-plan-row { display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--glass-border); border-radius:10px; background:rgba(255,255,255,0.03); font-size:13px; min-width:0; max-width:100%; overflow:hidden; }
.nfo-image-plan-source, .nfo-image-plan-target { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nfo-image-plan-source { flex:0 1 42%; }
.nfo-image-plan-arrow { flex:0 0 auto; color:var(--text-dim); }
.nfo-image-plan-target { flex:1 1 0; }

/* ============ DASHBOARD — Gallery Style ============ */

/* Hero banner */
.hero {
  position: relative; overflow: hidden;
  border-radius: 20px; margin-bottom: 28px;
  padding: 36px 32px;
  background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(0,206,201,0.08));
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}
.hero::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 100% at 30% 20%, rgba(108,92,231,0.12), transparent),
              radial-gradient(ellipse 50% 100% at 80% 50%, rgba(0,206,201,0.06), transparent);
}
.hero-server {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  position: relative; z-index: 1;
}
.hero-avatar {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #4834d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 20px rgba(108,92,231,0.4);
}
.hero-server h2 { font-size: 20px; font-weight: 600; }
.hero-server span { font-size: 12px; color: var(--text-muted); }

.hero-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  position: relative; z-index: 1;
}
@media (max-width: 480px) { .hero-stats { grid-template-columns: repeat(2,1fr); } }
.hero-stat {
  text-align: center; padding: 12px 8px;
  border-radius: 12px; background: rgba(255,255,255,0.03);
  border: 1px solid transparent;
  transition: all 0.25s ease;
}
.hero-stat:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.05); }
.hero-stat .val {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8f0 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-stat .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ---- Section Title ---- */
.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px;
}

/* ---- Poster Grid (Recently Added) ---- */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px; margin-bottom: 28px;
}
@media (max-width: 480px) { .poster-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; } }

.poster-card {
  position: relative; border-radius: 10px; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center center;
}
.poster-card:hover {
  transform: scale(1.06); z-index: 10;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--glass-border-hover);
  border-color: rgba(255,255,255,0.2);
}
.poster-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.poster-card:hover img { transform: scale(1.1); }

.poster-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
  pointer-events: none;
}
.poster-overlay .tt {
  font-size: 12px; font-weight: 600; color: #fff;
  line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.poster-overlay .yr {
  font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px;
}
.poster-type {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  font-size: 9px; padding: 3px 8px; border-radius: 20px;
  font-weight: 600; text-transform: uppercase;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: #fff; letter-spacing: 0.5px;
}
.poster-type.series { background: rgba(0,206,201,0.7); }
.poster-type.movie { background: rgba(108,92,231,0.7); }

.poster-placeholder {
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:28px;color:var(--text-muted);
}

/* ---- Activity Feed ---- */
.activity-feed {
  display: flex; flex-direction: column; gap: 0;
  max-height: 320px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent;
}
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px;
  transition: background 0.15s ease;
  font-size: 13px;
}
.activity-item:hover { background: var(--glass); }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent);
}
.activity-item .act-text { flex: 1; color: var(--text-dim); line-height: 1.4; }
.activity-item .act-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

/* ---- Sessions Row ---- */
.sessions-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}

/* ---- Now Playing ---- */
.nowplaying-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 10px;
  border-bottom: 1px solid var(--glass-border);
  transition: background 0.2s ease;
}
.nowplaying-item:last-child { border-bottom: none; }
.nowplaying-item:hover { background: var(--glass); }

.np-poster {
  width: 44px; height: 66px; border-radius: 6px; overflow: hidden; flex-shrink: 0;
  background: var(--glass); border: 1px solid var(--glass-border);
}
.np-poster img { width:100%; height:100%; object-fit:cover; }
.np-poster-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text-muted); }

.np-info { flex: 1; min-width:0; }
.np-user { font-size:13px; font-weight:600; color:var(--text); }
.np-title { font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:2px 0 6px; }
.np-progress { display:flex; align-items:center; gap:6px; }
.np-bar-bg { flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.np-bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 0.5s ease; }
.np-pct { font-size:10px; color:var(--text-muted); min-width:32px; text-align:right; }

.np-status { font-size:18px; flex-shrink:0; }
.np-status.playing { color:var(--green); }
.np-status.paused { color:var(--orange); }
.np-status.idle { color:var(--text-muted); }
.session-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 24px;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.2s ease; font-size: 12px;
}
.session-chip:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); }
.session-chip .u-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), #6c5ce7);
  color: #fff; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.session-chip .u-info { line-height: 1.3; }
.session-chip .u-name { font-weight: 600; color: var(--text); }
.session-chip .u-device { font-size: 10px; color: var(--text-muted); }

/* ---- Library Filter Chips ---- */
.lib-filter {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.dashboard-library-filter {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px;
  margin-bottom: 16px; width: 100%;
}
.filter-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-dim); transition: all 0.2s ease;
  user-select: none; -webkit-user-select: none; white-space: nowrap;
}
.dashboard-library-filter .filter-chip { text-align: center; padding: 7px 10px; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.filter-chip:hover { border-color: var(--glass-border-hover); color: var(--text); }
.filter-chip.active {
  background: rgba(108,92,231,0.2); border-color: var(--accent);
  color: #fff;
}

/* Two column for sections */
.dash-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
@media (max-width: 768px) { .dash-sections { grid-template-columns: 1fr; } }

/* Glass card for sections */
.glass-block {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ---- Library Grid ---- */
.lib-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
@media (max-width: 768px) { .lib-grid { grid-template-columns: repeat(2,1fr); gap: 10px; } }
@media (max-width: 480px) { .lib-grid { grid-template-columns: 1fr; } }

.lib-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 18px; cursor: pointer;
  transition: all var(--transition);
  position: relative; overflow: hidden;
}
.lib-card::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(108,92,231,0.12), transparent 60%);
  opacity: 0; transition: opacity var(--transition);
}
.lib-card:hover { border-color: var(--glass-border-hover); transform: translateY(-2px); }
.lib-card:hover::after { opacity: 1; }
.lib-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.lib-card p { font-size: 11px; color: var(--text-dim); margin: 2px 0; }
.lib-card .path { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lib-card .type-badge {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 20px; font-weight: 500; margin-bottom: 6px;
  background: rgba(108,92,231,0.15); color: var(--accent2);
}
.lib-card.tv .type-badge { background: rgba(0,206,201,0.15); color: var(--green); }

/* ---- Table Override ---- */
.el-table {
  --el-table-bg-color: transparent;
  --el-table-tr-bg-color: transparent;
  --el-table-header-bg-color: rgba(255,255,255,0.04);
  --el-table-border-color: var(--glass-border);
  --el-table-text-color: var(--text);

/* ---- Element Plus Overrides ---- */

}
.el-dialog {
  --el-dialog-bg-color: rgba(20,20,35,0.97);

}
.el-overlay { background: rgba(0,0,0,0.6) !important; }
@media (min-width: 769px) {

  .el-overlay-dialog:has(.library-items-dialog) { overflow: hidden; }
  .library-items-dialog { position: fixed !important; top: 48px !important; bottom: 48px !important; height: auto !important; width: min(85vw, calc(100vw - 320px)) !important; margin-top: 0 !important; margin-left: calc(240px + (100vw - 240px - min(85vw, calc(100vw - 320px))) / 2) !important; margin-right: 0 !important; margin-bottom: 0 !important; }

.library-items-dialog .el-dialog__body { height: calc(100% - 56px); padding: 12px 16px 14px; overflow: hidden; }
.library-items-panel { display: flex; flex-direction: column; height: 100%; min-height: 0; }

.library-pagination { flex-shrink: 0; padding-top: 8px; margin-top: 8px; border-top: 1px solid var(--glass-border); display: flex; justify-content: center; }
.library-pagination .el-pagination { flex-wrap: wrap; justify-content: center; row-gap: 6px; }
@media (max-width: 768px) {
  .library-items-dialog .el-dialog__body { height: auto; max-height: none; overflow: hidden; }
  .library-items-panel { height: calc(100dvh - 118px); min-height: 0; }

.el-dialog__header { border-bottom: 1px solid var(--glass-border); }
.el-dialog__title { color: var(--text); font-weight: 600; }

}

.el-tag { border: none !important; font-weight: 500; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

/* ---- User List (Vertical) ---- */

@media (max-width: 480px) {

/* Page header */

const API = '/api'

async function fetchJSON(url, opts = {}) {
  const res = await fetch(API+url, {headers:{'Content-Type':'application/json'},...opts})
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||res.statusText) }
  return res.json()
}

  data(){
    return {
      data: {media:{},server:{},users:{},sessions:{}},
      recent: [], activity: [], loaded: false,
      showDetail: false, detailItem: null, expanded: false, showDetailDel: false, showLibDel: false,
      isMobile: window.innerWidth < 640,
      libraries: [], activeLibrary: '', libraryName: '', _excludeIds: ''
    }
  },
  computed: {
    activePlaying(){
      if(!this.data.sessions?.streams) return []
      return this.data.sessions.streams.filter(s => s.has_playing)
    },
    idleCount(){
      if(!this.data.sessions?.streams) return 0
      return this.data.sessions.streams.filter(s => !s.has_playing).length
    }
  },
  async mounted(){
    window.addEventListener('resize', ()=>{ this.isMobile = window.innerWidth < 640 })
    await this.refreshAll()
    this._poll = setInterval(() => this.refreshStats(), 15000)
  },
  beforeUnmount(){ if(this._poll) clearInterval(this._poll) },
  methods: {
    async refreshAll(){
      try {
        const [ov, rec, act, libs] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/recent?limit=18'),
          fetchJSON('/dashboard/stats'),
          fetchJSON('/libraries'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
        this.libraries = (libs.libraries || []).filter(function(l) {
          return l.name !== '欧美自拍' && l.name !== '亚洲自拍' && l.name !== '日本有码'
        })
        // Find excluded library IDs
        var allLibs = libs.libraries || []
        var excludeNames = {'欧美自拍':1,'亚洲自拍':1,'日本有码':1}
        this._excludeIds = allLibs.filter(function(l){return excludeNames[l.name]}).map(function(l){return l.id}).join(',')
        // Set default to 欧美电影
        var defaultLibId = ''
        for(var i=0;i<allLibs.length;i++){if(allLibs[i].name==='欧美电影'){defaultLibId=allLibs[i].id;break}}
        // Fetch recent with default library
        try {
          var url = '/dashboard/recent?limit=18'
          if(defaultLibId) url += '&parent_id='+defaultLibId
          else if(this._excludeIds) url += '&exclude_parent_ids='+this._excludeIds
          const r2 = await fetchJSON(url)
          this.recent = r2.items || []
          this.activeLibrary = defaultLibId
          this.libraryName = defaultLibId ? '欧美电影' : ''
        } catch(e) {}
      } catch(e) { console.error(e) }
      this.loaded = true
    },
    async refreshStats(){
      try {
        const [ov, act] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/stats'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
      } catch(e) { /* silent */ }
    },
    async filterLibrary(id, name){
      this.activeLibrary = id; this.libraryName = name || '';
      try {
        var url = '/dashboard/recent?limit=18'
        if(id) url += '&parent_id='+id
        const rec = await fetchJSON(url)
        this.recent = rec.items || []
      } catch(e) { console.error(e) }
    },
    fmtTime(d){ if(!d)return''; const t=new Date(d); return t.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) },
    openUrl(url){ window.open(url, '_blank') },
    async deleteDetailItem(){
      if(!this.detailItem || !this.detailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.detailItem.id, {method:'DELETE'})
        this.recent = this.recent.filter(item => item.id !== this.detailItem.id)
        ElementPlus.ElMessage.success('已删除')
        this.showDetailDel = false
        this.showDetail = false
        setTimeout(() => this.refreshAll(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showDetailDel = false }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        const res = await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error('删除失败'); this.showLibDel = false }
    },
    async openItem(item){
      this.showDetail = true; this.expanded = false
      this.detailItem = item
      this.detailItem = item  // show basic info first
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id)
        this.detailItem = detail
      } catch(e) { /* keep basic info */ }
    }
  }
}

  methods: {
    async load(){ this.loading=true; const d=await fetchJSON('/users'); this.users=d.users||[]; this.loading=false },
    fmtDate(d){ if(!d)return'-'; const t=new Date(d); const now=new Date(); const diff=now-t; if(diff<864e5) return t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}); return t.toLocaleDateString('zh-CN',{month:'short',day:'numeric'}) },
    async addUser(){ await fetchJSON('/users?name='+encodeURIComponent(this.newName)+'&password='+encodeURIComponent(this.newPw),{method:'POST'}); this.showAdd=false; this.newName=''; this.newPw=''; this.load(); ElementPlus.ElMessage.success('用户已创建') },

    async toggleDisable(u){ await fetchJSON('/users/'+u.id+'/policy',{method:'PUT',body:JSON.stringify({IsDisabled:!u.is_disabled})}); this.load() },
  }

      isMobile: window.innerWidth < 640,
      showDetail:false, libDetailItem:null, libExpanded:false, showLibDel:false,
      _searchTimer:null
    }
  },
  async mounted(){
    const d=await fetchJSON('/libraries'); this.libraries=d.libraries||[];
    window.addEventListener('resize',()=>{this.isMobile=window.innerWidth<640})
  },
  methods: {
    libCountText(lib){
      const counts = lib.counts || {}
      if(lib.type === 'tvshows') return (counts.series || 0) + ' 部剧集'
      if(lib.type === 'movies') return (counts.movies || 0) + ' 部电影'
      return (counts.total || 0) + ' 个媒体'
    },
    libSubCountText(lib){
      return '点击查看全部'
    },
    openUrl(url){ window.open(url, '_blank') },
    async openLib(lib){
      this.curLib=lib; this.page=1; this.search=''; this.showItems=true;
      await this.loadItems()
    },
    onSearch(){
      if(this._searchTimer) clearTimeout(this._searchTimer);
      this._searchTimer = setTimeout(() => { this.page=1; this.loadItems() }, 400)
    },
    async loadItems(){
      if(!this.curLib)return; this.itemsLoading=true;
      const params = new URLSearchParams({page:this.page-1, limit:this.pageSize});
      if(this.search) params.set('search', this.search);
      if(this.curLib.type) params.set('types', this.curLib.type);
      const data = await fetchJSON('/libraries/'+this.curLib.id+'/items?'+params);
      this.items=data.items||[]; this.total=data.total||0;
      this.itemsLoading=false;
    },
    async openLibItem(item){
      this.showDetail=true; this.libExpanded=false; this.showLibDel=false;
      this.libDetailItem=item;
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id);
        this.libDetailItem = detail;
      } catch(e) { /* keep basic */ }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        this.items = this.items.filter(item => item.id !== this.libDetailItem.id)
        if(this.total > 0) this.total -= 1
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error(e.message||'删除失败'); this.showLibDel = false }
    }
  }
}

          <div>
            <input type="file" multiple accept="image/jpeg,image/png,image/webp" @change="uploadEpisodeImages" style="font-size:12px;color:var(--text-dim);max-width:220px" />

        </div>
        <div v-if="scanData.image_plan.length" style="display:grid;gap:8px;margin-bottom:12px;min-width:0;max-width:100%;overflow:hidden">
          <div v-for="item in scanData.image_plan" :key="item.source" class="nfo-image-plan-row">
            <span class="nfo-image-plan-source" :title="item.source">{{item.source}}</span><span class="nfo-image-plan-arrow">→</span><span class="nfo-image-plan-target" :title="item.target">{{item.target}}</span>
          </div>

        <div v-else style="font-size:13px;color:var(--green);margin-bottom:12px">暂无待重命名图片计划</div>

          <el-checkbox v-model="refreshEmby">执行后刷新 Emby 元数据</el-checkbox>
          <el-button @click="refreshEmbyNow" :loading="refreshingEmby" style="background:var(--glass);border:1px solid var(--glass-border);color:var(--text)">刷新 Emby 元数据</el-button>
        </div>
        <el-button @click="executeAutomation" :loading="executing" type="primary" size="large" style="width:100%;margin-top:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;font-weight:600;border-radius:12px">执行图片重命名 + 生成每集 NFO</el-button>

  `,
  data(){
    return {
      selectedDir: '', browseData: null, browseError: '', browsing:false, scanData: null, scanning:false, executing:false, savingTvshow:false, refreshEmby:true, refreshingEmby:false, logs: [],
      tv: { title:'', tmdb_id:'', dateadded:'', sorttitle:'', plot:'', outline:'', overwrite:false },
      pornhub: { strm_filename:'', url:'', preview:null, selectedTags:[], previewing:false, writing:false },
      artworkKinds: [
        {key:'poster', label:'poster.jpg', file:'poster.jpg'},
        {key:'fanart', label:'fanart.jpg', file:'fanart.jpg'},
        {key:'logo', label:'logo.png', file:'logo.png'},
      ]
    }
  },
  mounted(){ this.browseRoot() },
  methods:{
    async browseRoot(){ await this.browse('') },
    async browse(path){
      this.browsing=true; this.browseError='';
      try{
        const url = path ? `/api/nfo/automation/browse?path=${encodeURIComponent(path)}` : '/api/nfo/automation/browse';
        const res = await fetch(url);
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'浏览失败') }
        this.browseData = await res.json();
      }catch(e){ this.browseError=e.message||'浏览失败' }
      finally{ this.browsing=false }
    },
    async selectDir(path){
      this.selectedDir = path;
      await this.scan();
    },
    async scan(){
      if(!this.selectedDir){ ElementPlus.ElMessage.warning('请先选择演员目录'); return }
      this.scanning=true;
      try{
        const res = await fetch('/api/nfo/automation/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actor_dir:this.selectedDir})});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'扫描失败') }
        this.scanData = await res.json();
        if(!this.tv.title) this.tv.title = this.scanData.actor_name;
        if(this.scanData.episodes && this.scanData.episodes.length && !this.pornhub.strm_filename) this.pornhub.strm_filename = this.scanData.episodes[0].filename;
        ElementPlus.ElMessage.success('扫描完成');
      }catch(e){ ElementPlus.ElMessage.error(e.message||'扫描失败') }
      finally{ this.scanning=false }
    },
    async saveTvshow(){
      if(!this.scanData){ return }
      this.savingTvshow=true;
      try{
        const payload = Object.assign({}, this.tv, {actor_dir:this.selectedDir});
        const res = await fetch('/api/nfo/automation/tvshow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'保存失败') }
        const data = await res.json();
        ElementPlus.ElMessage.success(data.backup ? '已备份并保存 tvshow.nfo' : '已保存 tvshow.nfo');
        await this.scan();
      }catch(e){ ElementPlus.ElMessage.error(e.message||'保存失败') }
      finally{ this.savingTvshow=false }
    },
    async previewPornhubMetadata(){
      if(!this.pornhub.url){ ElementPlus.ElMessage.warning('请先粘贴 PornHub 地址'); return }
      this.pornhub.previewing = true;
      try{
        const res = await fetch('/api/nfo/automation/pornhub-metadata/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:this.pornhub.url})});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'抓取失败') }
        const data = await res.json();
        this.pornhub.preview = data;
        this.pornhub.selectedTags = (data.tags || []).slice();
        ElementPlus.ElMessage.success(`已抓取中文标签 ${data.chinese_tag_count} 个`);
      }catch(e){ ElementPlus.ElMessage.error(e.message||'抓取失败') }
      finally{ this.pornhub.previewing = false }
    },
    selectAllPornhubTags(){
      if(this.pornhub.preview) this.pornhub.selectedTags = (this.pornhub.preview.tags || []).slice();
    },
    clearPornhubTags(){ this.pornhub.selectedTags = [] },
    async writePornhubMetadata(){
      if(!this.pornhub.strm_filename){ ElementPlus.ElMessage.warning('请选择 .strm 文件'); return }
      if(!this.pornhub.preview){ ElementPlus.ElMessage.warning('请先抓取标签和发布时间'); return }
      this.pornhub.writing = true;
      try{
        const payload = {actor_dir:this.selectedDir, strm_filename:this.pornhub.strm_filename, published_at:this.pornhub.preview.published_at || '', tags:this.pornhub.selectedTags || []};
        const res = await fetch('/api/nfo/automation/pornhub-metadata/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'写入失败') }
        const data = await res.json();
        this.logs = (data.logs || []).concat(this.logs || []);
        ElementPlus.ElMessage.success(`已写入 ${data.tags.length} 个中文标签`);
        await this.scan();
      }catch(e){ ElementPlus.ElMessage.error(e.message||'写入失败') }
      finally{ this.pornhub.writing = false }
    },
    async uploadArtwork(kind, ev){
      const file = ev.target.files && ev.target.files[0];
      if(!file) return;
      const fd = new FormData(); fd.append('actor_dir', this.selectedDir); fd.append('kind', kind); fd.append('overwrite', 'true'); fd.append('image', file);
      try{
        const res = await fetch('/api/nfo/automation/upload-artwork',{method:'POST',body:fd});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'上传失败') }
        ElementPlus.ElMessage.success('上传成功'); ev.target.value=''; await this.scan();
      }catch(e){ ElementPlus.ElMessage.error(e.message||'上传失败') }
    },
    async uploadEpisodeImages(ev){
      const files = Array.from(ev.target.files||[]); if(!files.length) return;
      const fd = new FormData(); fd.append('actor_dir', this.selectedDir); files.forEach(f=>fd.append('images',f));
      try{
        const res = await fetch('/api/nfo/automation/upload-episode-images',{method:'POST',body:fd});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'上传失败') }
        const data = await res.json(); this.scanData = data.scan; ev.target.value=''; ElementPlus.ElMessage.success(`已上传 ${data.saved.length} 张图片`);
      }catch(e){ ElementPlus.ElMessage.error(e.message||'上传失败') }
    },
    async refreshEmbyNow(){
      this.refreshingEmby=true;
      try{
        const payload = this.selectedDir ? {actor_dir:this.selectedDir} : {};
        const res = await fetch('/api/nfo/automation/refresh-emby',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'刷新失败') }
        this.logs = ['刷新Emby媒体库: 已提交'].concat(this.logs || []);
        ElementPlus.ElMessage.success('已提交 Emby 元数据刷新');
      }catch(e){ ElementPlus.ElMessage.error(e.message||'刷新失败') }
      finally{ this.refreshingEmby=false }
    },
    async executeAutomation(){
      if(!this.scanData){ return }
      this.executing=true; this.logs=[];
      try{
        const res = await fetch('/api/nfo/automation/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({actor_dir:this.selectedDir, refresh_emby:this.refreshEmby})});
        if(!res.ok){ const e=await res.json(); throw new Error(e.detail||'执行失败') }
        const data = await res.json(); this.logs = data.logs; this.scanData = data.scan; ElementPlus.ElMessage.success('执行完成');
      }catch(e){ ElementPlus.ElMessage.error(e.message||'执行失败') }
      finally{ this.executing=false }
    }
  }
}

  data(){ return { searchQuery:'', searchResults:[], searching:false, searchError:'', monitoredList:[], loadingList:false, refreshing:false, hasCachedList:false, showSettings:false, filterStatus:'all', monitorStatus:null, logs:[], activeCollapse:[], config:{tmdb_api_key:'',tg_bot_token:'',tg_chat_id:'',proxy_url:'',check_cron:'*/30 * * * *'} } },
  computed:{ filteredList(){ if(this.filterStatus==='continuing') return this.monitoredList.filter(s=>s.current_status!=='Ended'&&s.current_status!=='Canceled'); if(this.filterStatus==='ended') return this.monitoredList.filter(s=>s.current_status==='Ended'); return this.monitoredList } },
  async mounted(){ this.restoreCachedList(); this.loadList({background:this.hasCachedList}); await this.loadConfig(); await this.loadStatus(); await this.loadLogs(); this._statusTimer=setInterval(()=>{this.loadStatus();this.loadLogs()},30000) },
  beforeUnmount(){ if(this._statusTimer) clearInterval(this._statusTimer) },
  methods:{
    onSearchInput(){ if(!this.searchQuery.trim()) this.clearSearchResults() },
    clearSearchResults(){ this.searchResults=[]; this.searchError='' },
    async doSearch(){ if(!this.searchQuery.trim()){ this.clearSearchResults(); return } this.searching=true; this.searchError=''; try{ const d=await fetchJSON('/tmdb/search?q='+encodeURIComponent(this.searchQuery.trim())); this.searchResults=d.results||[]; if(!this.searchResults.length) this.searchError='未找到相关剧集' }catch(e){ this.searchError=e.message }finally{ this.searching=false } },
    async addSeries(item){ try{ const d=await fetchJSON('/monitor/add',{method:'POST',body:JSON.stringify({tmdb_id:item.tmdb_id,title:item.title,year:item.year,poster_url:item.poster_url})}); if(!this.monitoredList.some(s=>s.tmdb_id===item.tmdb_id)){ this.monitoredList=[...this.monitoredList,{tmdb_id:item.tmdb_id,title:item.title,year:item.year,poster_url:item.poster_url,last_status:'Unknown',current_status:'Unknown',notified_ended:false}]; this.hasCachedList=true; this.saveCachedList() } ElementPlus.ElMessage.success(d.notification_sent?'已添加并发送通知':'已添加，正在后台刷新信息'); this.clearSearchResults(); this.searchQuery=''; this.loadList({background:true}); setTimeout(()=>this.loadList({background:true}),2000); await this.loadStatus() }catch(e){ ElementPlus.ElMessage.error(e.message) } },
    async deleteSeries(tmdbId){ try{ await ElementPlus.ElMessageBox.confirm('确定要删除该剧集的监控吗？','确认删除',{type:'warning'}); await fetchJSON('/monitor/'+tmdbId,{method:'DELETE'}); this.monitoredList=this.monitoredList.filter(s=>s.tmdb_id!==tmdbId); this.saveCachedList(); ElementPlus.ElMessage.success('已删除'); await this.loadStatus() }catch(e){ if(e!=='cancel') ElementPlus.ElMessage.error(e.message||'删除失败') } },
    restoreCachedList(){ try{ const raw=localStorage.getItem('emby-manager:monitor:list'); if(!raw) return; const cached=JSON.parse(raw); if(Array.isArray(cached.series)){ this.monitoredList=cached.series; this.hasCachedList=this.monitoredList.length>0 } }catch(e){ localStorage.removeItem('emby-manager:monitor:list') } },
    saveCachedList(){ try{ localStorage.setItem('emby-manager:monitor:list', JSON.stringify({series:this.monitoredList, savedAt:Date.now()})) }catch(e){} },
    async loadList(opts={}){ const background=!!opts.background; if(background) this.refreshing=true; else this.loadingList=true; try{ const d=await fetchJSON('/monitor/list'); this.monitoredList=d.series||[]; this.hasCachedList=this.monitoredList.length>0; this.saveCachedList() }catch(e){}finally{ if(background) this.refreshing=false; else this.loadingList=false } },
    async refreshList(){ this.refreshing=true; await this.loadList({background:true}); this.refreshing=false },
    async loadConfig(){ try{ const d=await fetchJSON('/config'); this.config={...this.config,...d} }catch(e){} },
    async saveConfig(){ try{ const payload={tmdb_api_key:this.config.tmdb_api_key,tg_bot_token:this.config.tg_bot_token,tg_chat_id:this.config.tg_chat_id,proxy_url:this.config.proxy_url,check_cron:(this.config.check_cron||'*/30 * * * *').trim()}; await fetchJSON('/config',{method:'PUT',body:JSON.stringify(payload)}); ElementPlus.ElMessage.success('保存成功'); this.showSettings=false; await this.loadStatus() }catch(e){ ElementPlus.ElMessage.error(e.message||'保存失败') } },
    async testConfig(){ try{ const d=await fetchJSON('/config/test',{method:'POST'}); d.success ? ElementPlus.ElMessage.success(d.message||'测试消息已发送') : ElementPlus.ElMessage.error(d.error||'测试失败') }catch(e){ ElementPlus.ElMessage.error(e.message||'测试失败') } },
    async loadStatus(){ try{ this.monitorStatus=await fetchJSON('/monitor/status') }catch(e){} },
    async loadLogs(){ try{ this.logs=await fetchJSON('/monitor/logs?limit=50') }catch(e){} },
    fmtTime2(t){ if(!t) return '-'; return new Date(t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) },
    daysUntil(dateStr){ if(!dateStr) return ''; const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const p=dateStr.split('-'); const target=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); const diff=Math.round((target-today)/86400000); if(diff<0)return'已播出'; if(diff===0)return'今天'; if(diff===1)return'明天'; return diff+'天后' }
  }
}

// ---- Router ----
const routes = [
  {path:'/',component:Dashboard},
  {path:'/users',component:Users},
  {path:'/libraries',component:Libraries},
  {path:'/nfo',component:NfoGenerator},
  {path:'/monitor',component:Monitor},
]
const router = VueRouter.createRouter({
  history:VueRouter.createWebHashHistory(),
  routes,
  scrollBehavior(){ return {top:0,left:0} }
})

const app = Vue.createApp({})
app.use(router)
app.use(ElementPlus)
app.mount('#app')
</script>
