<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Emby Manager</title>
<link rel="icon" href="lib/favicon.png">
<link rel="stylesheet" href="lib/element-plus.css"/>
<script src="lib/vue.js"></script>
<script src="lib/vue-router.js"></script>
<script src="lib/element-plus.js"></script>

<style>
/* ==========================================================================
   Emby Manager — Cute Dark SaaS UI
   Design DNA: Arc Browser × Linear × Notion Calendar
   ========================================================================== */

/* ---- Design Tokens ---- */
:root {
  /* Core palette */
  --bg: #0F0D1A;
  --bg-alt: #13112A;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.11);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.16);

  /* Text */
  --text: #EEEEF5;
  --text-dim: rgba(238,238,245,0.55);
  --text-muted: rgba(238,238,245,0.3);

  /* Brand colors */
  --purple: #7C5CFC;
  --purple-soft: rgba(124,92,252,0.2);
  --purple-glow: rgba(124,92,252,0.3);
  --pink: #FF6B9D;
  --pink-soft: rgba(255,107,157,0.2);
  --teal: #00D4AA;
  --teal-soft: rgba(0,212,170,0.15);
  --orange: #FFB347;
  --orange-soft: rgba(255,179,71,0.15);
  --red: #FF6B6B;
  --red-soft: rgba(255,107,107,0.15);
  --green: #00D4AA;

  /* Accent aliases (keep compatibility) */
  --accent: var(--purple);
  --accent-glow: var(--purple-glow);
  --accent2: #B9A9FF;

  /* Geometry */
  --radius: 24px;
  --radius-sm: 16px;
  --radius-xs: 12px;
  --radius-pill: 999px;

  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
  --shadow-glow: 0 8px 32px var(--purple-glow);

  /* Motion */
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --transition: 0.35s var(--smooth);
}

/* ---- Global ---- */
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  overflow-x: hidden;
  letter-spacing: -0.01em;
}

/* ---- Background Ambient ---- */
.bg-ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 0%, rgba(124,92,252,0.10), transparent),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(255,107,157,0.06), transparent),
    radial-gradient(ellipse 40% 40% at 50% 90%, rgba(0,212,170,0.05), transparent);
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ============ LAYOUT ============ */
.layout { display: flex; min-height: 100dvh; position: relative; z-index: 1; }

/* ============ SIDEBAR — Cute Glossy ============ */
.sidebar {
  width: 240px; min-height: 100dvh;
  background: linear-gradient(180deg, rgba(18,15,42,0.95) 0%, rgba(15,13,26,0.98) 100%);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border-right: 1px solid rgba(124,92,252,0.12);
  padding: 20px 0;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 90;
  transition: transform var(--transition);
}
.sidebar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,92,252,0.3), transparent);
}
.sidebar-logo {
  padding: 0 20px; margin-bottom: 32px;
  display: flex; align-items: center; gap: 14px;
}
.sidebar-logo .icon {
  width: 40px; height: 40px; border-radius: 14px;
  background: linear-gradient(135deg, var(--purple), #5a3fd9);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 16px var(--purple-glow);
  transition: transform 0.3s var(--spring);
}
.sidebar-logo:hover .icon { transform: scale(1.05) rotate(-2deg); }
.sidebar-logo h2 {
  font-size: 18px; font-weight: 700; color: var(--text);
  letter-spacing: -0.5px;
}
.sidebar nav { padding: 0 10px; }
.sidebar nav a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; margin-bottom: 4px;
  color: var(--text-dim); text-decoration: none;
  font-size: 14px; font-weight: 500;
  border-radius: 14px; transition: all 0.3s var(--smooth);
  position: relative;
}
.sidebar nav a:hover { color: var(--text); background: var(--glass); transform: translateX(4px); }
.sidebar nav a.router-link-active {
  color: #fff;
  background: linear-gradient(135deg, var(--purple-soft), rgba(124,92,252,0.05));
  box-shadow: inset 0 0 0 1px rgba(124,92,252,0.2);
}
.sidebar nav a .nav-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar nav a.router-link-active::before {
  content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 24px; border-radius: 0 4px 4px 0;
  background: linear-gradient(180deg, var(--purple), var(--pink));
  box-shadow: 0 0 12px var(--purple-glow);
}
.sidebar-version {
  position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px;
  padding: 8px 0;
}

.main { margin-left: 240px; flex: 1; padding: 32px 36px; max-width: 100%; }

/* ============ HERO — Playful Welcome ============ */
.hero {
  position: relative; overflow: hidden;
  border-radius: 24px; margin-bottom: 28px;
  padding: 32px 28px;
  background: linear-gradient(135deg, rgba(124,92,252,0.12), rgba(255,107,157,0.06), rgba(0,212,170,0.04));
  border: 1px solid rgba(124,92,252,0.1);
}
.hero::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 80% at 20% 30%, rgba(124,92,252,0.10), transparent),
    radial-gradient(ellipse 40% 60% at 70% 40%, rgba(255,107,157,0.06), transparent);
}
.hero-server {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
  position: relative; z-index: 1;
}
.hero-avatar {
  width: 48px; height: 48px; border-radius: 16px;
  background: linear-gradient(135deg, var(--purple), #5a3fd9);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 20px var(--purple-glow);
  transition: transform 0.3s var(--spring);
}
.hero-avatar:hover { transform: rotate(-5deg) scale(1.05); }
.hero-server h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.hero-server span { font-size: 13px; color: var(--text-dim); font-weight: 450; }
.hero-stats {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  position: relative; z-index: 1;
}
@media (max-width: 600px) { .hero-stats { grid-template-columns: repeat(2,1fr); } }
.hero-stat {
  text-align: center; padding: 16px 8px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.3s var(--smooth);
  position: relative; overflow: hidden;
}
.hero-stat::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--purple), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.hero-stat:hover { border-color: rgba(124,92,252,0.15); background: rgba(124,92,252,0.05); transform: translateY(-2px); }
.hero-stat:hover::before { opacity: 1; }
.hero-stat .stat-icon { font-size: 20px; margin-bottom: 6px; }
.hero-stat .val {
  font-size: 28px; font-weight: 750; letter-spacing: -1px;
  background: linear-gradient(135deg, #f0eeff 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-stat .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-weight: 500; letter-spacing: 0.3px; }

/* ============ SECTION TITLE ============ */
.section-title {
  font-size: 16px; font-weight: 650; margin-bottom: 16px;
  letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px;
}

/* ============ FILTER CHIPS — Cute Pills ============ */
.lib-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filter-chip {
  padding: 7px 18px; border-radius: 999px; font-size: 12px; cursor: pointer;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  color: var(--text-dim); transition: all 0.3s var(--smooth);
  user-select: none; font-weight: 500;
}
.filter-chip:hover { border-color: rgba(124,92,252,0.2); color: var(--text); background: rgba(124,92,252,0.06); transform: translateY(-1px); }
.filter-chip.active {
  background: linear-gradient(135deg, var(--purple-soft), rgba(124,92,252,0.05));
  border-color: var(--purple); color: #fff;
  box-shadow: 0 0 24px var(--purple-glow);
}

/* ============ POSTER GRID ============ */
.poster-grid {
  display: grid; gap: 14px; margin-bottom: 32px;
  grid-template-columns: repeat(5, 1fr);
}
@media (max-width: 900px) { .poster-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; } }
@media (max-width: 600px) { .poster-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; } }
@media (max-width: 400px) { .poster-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }

.poster-card {
  position: relative; border-radius: 16px; overflow: hidden;
  aspect-ratio: 2/3; cursor: pointer;
  background: var(--glass); border: 1px solid var(--glass-border);
  transition: all 0.45s var(--spring);
}
.poster-card:hover {
  transform: scale(1.08) translateY(-6px); z-index: 20;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,92,252,0.15);
  border-color: rgba(124,92,252,0.2);
}
.poster-card img { width: 100%; height: 100%; object-fit: cover; }
.poster-card .poster-type {
  position: absolute; top: 8px; left: 8px; padding: 3px 10px;
  border-radius: 999px; font-size: 10px; font-weight: 600;
  backdrop-filter: blur(10px);
}
.poster-card .poster-type.series { background: rgba(255,107,157,0.7); color: #fff; }
.poster-card .poster-type.movie { background: rgba(124,92,252,0.7); color: #fff; }
.poster-card .poster-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 10px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}
.poster-card .poster-overlay .tt { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.poster-card .poster-overlay .yr { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ============ GLASS CARD ============ */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 24px;
  transition: all 0.35s var(--smooth);
}
.glass-card:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); box-shadow: var(--shadow-md); }

/* ============ TWO COLUMNS ============ */
.dash-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 768px) { .dash-sections { grid-template-columns: 1fr; } }
.glass-block {
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 22px;
  transition: all 0.35s var(--smooth);
}
.glass-block:hover { border-color: var(--glass-border-hover); }

/* ============ ACTIVITY FEED ============ */
.activity-feed { display: flex; flex-direction: column; gap: 0; }
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.2s; border-radius: 8px;
}
.activity-item:last-child { border-bottom: none; }
.activity-item:hover { background: rgba(255,255,255,0.03); padding-left: 8px; padding-right: 8px; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  box-shadow: 0 0 8px var(--purple-glow);
}
.act-text { flex: 1; font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.act-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

/* ============ NOW PLAYING ============ */
.nowplaying-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: all 0.3s var(--smooth);
}
.nowplaying-item:last-child { border-bottom: none; }
.nowplaying-item:hover { background: var(--glass); }
.np-poster {
  width: 48px; height: 68px; border-radius: 10px; overflow: hidden; flex-shrink: 0;
  background: var(--glass); border: 1px solid var(--glass-border);
}
.np-poster img { width:100%; height:100%; object-fit:cover; }
.np-poster-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text-muted); }
.np-info { flex:1; min-width:0; }
.np-user { font-size:13px; font-weight:600; }
.np-title { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:3px 0 8px; }
.np-progress { display:flex; align-items:center; gap:8px; }
.np-bar-bg { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
.np-bar-fill { height:100%; background:linear-gradient(90deg,var(--purple),var(--pink)); border-radius:4px; transition:width 0.5s var(--smooth); }
.np-pct { font-size:10px; color:var(--text-muted); min-width:32px; text-align:right; }
.np-status { font-size:16px; flex-shrink:0; }
.np-status.playing { color: var(--teal); }
.np-status.paused { color: var(--orange); }

/* ============ USER LIST ============ */
.user-list { display: flex; flex-direction: column; gap: 8px; }
.user-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  transition: all 0.3s var(--smooth);
}
.user-row:hover { border-color: var(--glass-border-hover); background: var(--glass-hover); transform: translateX(4px); }
.user-row .ur-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, var(--purple), var(--accent2));
  box-shadow: 0 4px 16px var(--purple-glow);
}
.user-row .ur-avatar.admin { background: linear-gradient(135deg, var(--pink), #e84393); }
.user-row .ur-avatar.disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); box-shadow: none; }
.user-row .ur-meta { flex: 1; min-width: 0; }
.user-row .ur-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.user-row .ur-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.user-row .ur-tag { font-size: 10px; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
.user-row .ur-tag.admin { background: var(--pink-soft); color: var(--pink); }
.user-row .ur-tag.normal { background: var(--teal-soft); color: var(--teal); }
.user-row .ur-tag.disabled { background: var(--red-soft); color: var(--red); }
.user-row .ur-tag.date { background: rgba(255,255,255,0.04); color: var(--text-muted); }
.user-row .ur-actions { display: flex; gap: 6px; flex-shrink: 0; }
@media (max-width: 480px) {
  .user-row { flex-wrap: wrap; }
  .user-row .ur-actions { width: 100%; justify-content: flex-end; padding-top: 4px; }
}

/* ============ LIBRARY GRID ============ */
.lib-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media (max-width: 768px) { .lib-grid { grid-template-columns: repeat(2,1fr); gap: 12px; } }

</style>
</head>
<body>

<div class="bg-ambient"></div>

<div id="app">
  <!-- Mobile Top Bar -->
  <div class="topbar">
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>
    <h2>Emby</h2>
  </div>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar (outside layout to avoid z-index issues) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🎬</div>
      <h2>Emby</h2>
    </div>
    <nav>
      <a href="#/" onclick="navClose()"><span class="nav-icon">📊</span> 仪表盘</a>
      <a href="#/users" onclick="navClose()"><span class="nav-icon">👥</span> 用户管理</a>
      <a href="#/libraries" onclick="navClose()"><span class="nav-icon">📂</span> 媒体库</a>
    </nav>
    <div class="sidebar-version">v1.10</div>
  </aside>

  <!-- Main -->
  <div class="layout">
    <main class="main">
      <router-view></router-view>
    </main>
  </div>
</div>

<script>
function toggleSidebar() {
  var s = document.getElementById('sidebar');
  var o = document.querySelector('.sidebar-overlay');
  s.classList.toggle('open'); o.classList.toggle('show');
}
function navClose() { setTimeout(toggleSidebar, 120); }

const API = '/api'

async function fetchJSON(url, opts = {}) {
  const res = await fetch(API+url, {headers:{'Content-Type':'application/json'},...opts})
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||res.statusText) }
  return res.json()
}

// ---- Dashboard (Gallery Style) ----
const Dashboard = {
  template: `
    <div>
      <!-- Hero Banner -->
      <div class="hero fade-in">
        <div class="hero-server">
          <div class="hero-avatar">🎬</div>
          <div>
            <h2>{{data.server?.name||'Emby'}}</h2>
            <span>v{{data.server?.version||'?'}} · {{data.users?.total||0}} 用户</span>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat fade-in fade-in-1">
            <div class="stat-icon">🎬</div>
            <div class="val">{{data.media?.movies||0}}</div>
            <div class="lbl">电影</div>
          </div>
          <div class="hero-stat fade-in fade-in-2">
            <div class="stat-icon">📺</div>
            <div class="val">{{data.media?.series||0}}</div>
            <div class="lbl">剧集</div>
          </div>
          <div class="hero-stat fade-in fade-in-3">
            <div class="stat-icon">📀</div>
            <div class="val">{{data.media?.episodes||0}}</div>
            <div class="lbl">单集</div>
          </div>
          <div class="hero-stat fade-in fade-in-4">
            <div class="stat-icon">🟢</div>
            <div class="val">{{data.sessions?.active||0}}</div>
            <div class="lbl">在线</div>
          </div>
        </div>
      </div>

      <!-- Recently Added Poster Wall -->
      <div class="section-title">
        🆕 最近添加
        <span style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:auto" v-if="libraryName">{{libraryName}}</span>
      </div>

      <!-- Library Filter Chips -->
      <div class="lib-filter" v-if="libraries.length">
        <span class="filter-chip" v-for="lib in libraries" :key="lib.id"
              :class="{active:activeLibrary===lib.id}"
              @click="filterLibrary(lib.id, lib.name)">{{lib.name}}</span>
      </div>

      <div class="poster-grid" v-if="recent.length">
        <div class="poster-card fade-in" v-for="(item,i) in recent" :key="item.id"
             :style="'animation-delay:'+(i*0.04)+'s'"
             @click="openItem(item)">
          <img :src="item.image_url" loading="lazy" alt=""
               @error="$event.target.style.display='none'"
               @load="$event.target.style.display=''">
          <div class="poster-type" :class="item.type==='Series'?'series':'movie'">
            {{item.type==='Series'?'剧集':'电影'}}
          </div>
          <div class="poster-overlay">
            <div class="tt">{{item.name}}</div>
            <div class="yr" v-if="item.year">{{item.year}}</div>
          </div>
        </div>
      </div>
      <div v-else-if="!recent.length && loaded" class="empty-state">暂无内容</div>

      <!-- Two-Column Sections -->
      <div class="dash-sections">
        <!-- Activity -->
        <div class="glass-block">
          <div class="section-title" style="margin-bottom:10px">📜 最近活动</div>
          <div class="activity-feed" v-if="activity.length">
            <div class="activity-item" v-for="(a,i) in activity" :key="i">
              <div class="activity-dot"></div>
              <div class="act-text">{{a.name}}</div>
              <div class="act-time">{{fmtTime(a.date)}}</div>
            </div>
          </div>
          <div v-else class="empty-state" style="padding:20px">暂无活动</div>
        </div>

        <!-- Active Sessions -->
        <div class="glass-block">

  data(){
    return {
      data: {media:{},server:{},users:{},sessions:{}},
      recent: [], activity: [], loaded: false,
      showDetail: false, detailItem: null, expanded: false, showDetailDel: false, showLibDel: false,
      isMobile: window.innerWidth < 640,
      libraries: [], activeLibrary: '', libraryName: '', _excludeIds: ''
    }
  },
  computed: {
    activePlaying(){
      if(!this.data.sessions?.streams) return []
      return this.data.sessions.streams.filter(s => s.has_playing)
    },
    idleCount(){
      if(!this.data.sessions?.streams) return 0
      return this.data.sessions.streams.filter(s => !s.has_playing).length
    }
  },
  async mounted(){
    window.addEventListener('resize', ()=>{ this.isMobile = window.innerWidth < 640 })
    await this.refreshAll()
    this._poll = setInterval(() => this.refreshStats(), 15000)
  },
  beforeUnmount(){ if(this._poll) clearInterval(this._poll) },
  methods: {
    async refreshAll(){
      try {
        const [ov, rec, act, libs] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/recent?limit=18'),
          fetchJSON('/dashboard/stats'),
          fetchJSON('/libraries'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
        this.libraries = (libs.libraries || []).filter(function(l) {
          return l.name !== '欧美自拍' && l.name !== '亚洲自拍' && l.name !== '日本有码'
        })
        // Find excluded library IDs
        var allLibs = libs.libraries || []
        var excludeNames = {'欧美自拍':1,'亚洲自拍':1,'日本有码':1}
        this._excludeIds = allLibs.filter(function(l){return excludeNames[l.name]}).map(function(l){return l.id}).join(',')
        // Set default to 欧美电影
        var defaultLibId = ''
        for(var i=0;i<allLibs.length;i++){if(allLibs[i].name==='欧美电影'){defaultLibId=allLibs[i].id;break}}
        // Fetch recent with default library
        try {
          var url = '/dashboard/recent?limit=18'
          if(defaultLibId) url += '&parent_id='+defaultLibId
          else if(this._excludeIds) url += '&exclude_parent_ids='+this._excludeIds
          const r2 = await fetchJSON(url)
          this.recent = r2.items || []
          this.activeLibrary = defaultLibId
          this.libraryName = defaultLibId ? '欧美电影' : ''
        } catch(e) {}
      } catch(e) { console.error(e) }
      this.loaded = true
    },
    async refreshStats(){
      try {
        const [ov, act] = await Promise.all([
          fetchJSON('/dashboard/overview'),
          fetchJSON('/dashboard/stats'),
        ])
        this.data = ov
        this.activity = (act.activity || []).slice(0, 8)
      } catch(e) { /* silent */ }
    },
    async filterLibrary(id, name){
      this.activeLibrary = id; this.libraryName = name || '';
      try {
        var url = '/dashboard/recent?limit=18'
        if(id) url += '&parent_id='+id
        const rec = await fetchJSON(url)
        this.recent = rec.items || []
      } catch(e) { console.error(e) }
    },
    fmtTime(d){ if(!d)return''; const t=new Date(d); return t.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) },
    openUrl(url){ window.open(url, '_blank') },
    async deleteDetailItem(){
      if(!this.detailItem || !this.detailItem.id) return
      try {
        const res = await fetchJSON('/dashboard/item/'+this.detailItem.id, {method:'DELETE'})
        ElementPlus.ElMessage.success('已删除')
        this.showDetailDel = false
        this.showDetail = false
        setTimeout(() => this.refreshAll(), 100)
      } catch(e) { ElementPlus.ElMessage.error('删除失败'); this.showDetailDel = false }
    },
    async deleteLibItem(){
      if(!this.libDetailItem || !this.libDetailItem.id) return
      try {
        const res = await fetchJSON('/dashboard/item/'+this.libDetailItem.id, {method:'DELETE'})
        ElementPlus.ElMessage.success('已删除')
        this.showLibDel = false
        this.showDetail = false
        setTimeout(() => this.loadItems(), 100)
      } catch(e) { ElementPlus.ElMessage.error('删除失败'); this.showLibDel = false }
    },
    async openItem(item){
      this.showDetail = true; this.expanded = false
      this.detailItem = item
      this.detailItem = item  // show basic info first
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id)
        this.detailItem = detail
      } catch(e) { /* keep basic info */ }
    }
  }
}

  data(){
    return {
      libraries:[], libSearch:'', showItems:false, curLib:null, searchResults: null,
      items:[], itemsLoading:false, total:0, page:1, search:'',
      isMobile: window.innerWidth < 640,
      showDetail:false, libDetailItem:null, libExpanded:false,
      _searchTimer:null, loadingMore:false
    }
  },
  async mounted(){
    const d=await fetchJSON('/libraries'); this.libraries=d.libraries||[];
    window.addEventListener('resize',()=>{this.isMobile=window.innerWidth<640})
  },
  methods: {
    openUrl(url){ window.open(url, '_blank') },
    onGlobalSearch(){
      if(this._gsTimer) clearTimeout(this._gsTimer)
      var query = this.libSearch
      if(!query || query.trim() === '') { this.searchResults = null; return }
      this._gsTimer = setTimeout(() => {
        var me = this
        fetchJSON('/dashboard/recent?limit=50&search='+encodeURIComponent(query)).then(function(d){
          me.searchResults = d.items || []
        }).catch(function(){ me.searchResults = [] })
      }, 300)
    },
    clearGlobalSearch(){ this.searchResults = null },
    onDialogOpened(){
      this.$nextTick(() => {
        var body = this.$refs?.scrollBody
        if(body) body.scrollTop = 0
      })
    },
    onDialogClosed(){
      this.items = []; this.page = 1; this.total = 0
    },
    onScroll(){
      var body = this.$refs?.scrollBody
      if(!body || this.loadingMore || this.itemsLoading) return
      if(body.scrollTop + body.clientHeight >= body.scrollHeight - 300) {
        if(this.items.length < this.total) {
          this.page++
          this.loadingMore = true
          this.loadItems(true)
        }
      }
    },
    async openLib(lib){
      this.curLib=lib; this.page=1; this.search=''; this.items=[];
      this.showItems=true;
      this.itemsLoading=true;
      await this.loadItems(false)
    },
    onSearch(){
      if(this._searchTimer) clearTimeout(this._searchTimer);
      this._searchTimer = setTimeout(() => {
        this.page=1; this.items=[]; this.itemsLoading=true;
        this.loadItems(false)
      }, 400)
    },
    async loadItems(append){
      if(!this.curLib)return;
      if(!append) this.itemsLoading=true;
      const params = new URLSearchParams({page:this.page-1, limit:30});
      if(this.search) params.set('search', this.search);
      if(this.curLib.type) params.set('types', this.curLib.type);
      const data = await fetchJSON('/libraries/'+this.curLib.id+'/items?'+params);
      if(append) {
        this.items = this.items.concat(data.items||[])
      } else {
        this.items=data.items||[];
      }
      this.total=data.total||0;
      this.itemsLoading=false;
      this.loadingMore=false;
    },
    async openLibItem(item){
      this.showDetail=true; this.libExpanded=false;
      this.libDetailItem=item;
      try {
        const detail = await fetchJSON('/dashboard/item/'+item.id);
        this.libDetailItem = detail;
      } catch(e) { /* keep basic */ }
    }
  }
}

// ---- Router ----
const routes = [
  {path:'/',component:Dashboard},
  {path:'/users',component:Users},
  {path:'/libraries',component:Libraries},
]
const router = VueRouter.createRouter({
  history:VueRouter.createWebHashHistory(),
  routes,
  scrollBehavior(){ return {top:0,left:0} }
})

const app = Vue.createApp({})
app.use(router)
app.use(ElementPlus)
app.mount('#app')
</script>
